<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ACES Research System</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-md px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Set New Password</h1>
        <p class="text-sm text-gray-500 mt-1">Enter your new password below.</p>
      </div>

      <div id="error-invalid" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4">
        This reset link is invalid or has expired.
        <a href="/pages/forgot-password.html" class="underline font-medium ml-1">Request a new one.</a>
      </div>

      <div id="success-msg" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-lg mb-4"></div>
      <div id="error-msg"   class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4"></div>

      <form id="reset-form" novalidate>
        <input id="token-input" type="hidden">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
            <input id="password" type="password" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
              placeholder="Min 8 chars, 1 uppercase, 1 number">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <input id="confirm_password" type="password" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>
        </div>
        <button type="submit" id="submit-btn"
          class="mt-6 w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors disabled:opacity-60">
          Reset Password
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <a href="/pages/login.html" class="text-primary-600 hover:underline">Back to login</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    if (!token) {
      document.getElementById('error-invalid').classList.remove('hidden');
      document.getElementById('reset-form').classList.add('hidden');
    } else {
      document.getElementById('token-input').value = token;
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('submit-btn');
      const errEl  = document.getElementById('error-msg');
      const succEl = document.getElementById('success-msg');
      errEl.classList.add('hidden'); succEl.classList.add('hidden');

      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true; btn.textContent = 'Resetting…';
      try {
        const res  = await apiPost('/api/v1/auth/reset-password', { token, password: pw });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.message || 'Reset failed.';
          errEl.classList.remove('hidden');
          return;
        }
        succEl.textContent = 'Password reset! Redirecting to login…';
        succEl.classList.remove('hidden');
        setTimeout(() => { window.location.href = '/pages/login.html'; }, 2000);
      } catch {
        errEl.textContent = 'Network error.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
