<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Document "” ACES Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input {
      width: 100%; padding: .5rem .75rem; font-size: .875rem;
      border: 1px solid #d1d5db; border-radius: .5rem; outline: none;
      transition: border-color .15s, box-shadow .15s; background: #fff;
    }
    .form-input:focus { border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,.25); }
    .drop-zone {
      border: 2px dashed #d1d5db; border-radius: .75rem; padding: 2.5rem 1.5rem;
      text-align: center; cursor: pointer; transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #22c55e; background: #f0fdf4; }
    .status-badge { display:inline-flex; align-items:center; padding:.2rem .55rem; border-radius:9999px; font-size:.7rem; font-weight:600; text-transform:uppercase; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a id="back-btn" href="/pages/student/my-submissions.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">ACES Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto px-6 py-10">

    <!-- Page header -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Upload Document</h1>
      <p class="text-sm text-gray-500 mt-1">Attach research documents to your submission. Accepted: PDF, DOCX (max 20 MB)</p>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-5 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Submission selector -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-2">Submission <span class="text-red-500">*</span></label>
      <select id="f-submission" class="form-input">
        <option value="">Select a submission…</option>
      </select>
      <div id="sub-detail" class="hidden mt-3 px-4 py-3 bg-gray-50 rounded-lg border border-gray-200 text-sm text-gray-700"></div>
    </div>

    <!-- Upload form -->
    <div id="upload-section" class="hidden bg-white rounded-xl border border-gray-200 shadow-sm p-5">

      <!-- Document type -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Document Type <span class="text-red-500">*</span></label>
        <select id="f-doc-type" class="form-input">
          <option value="">Select document type…</option>
          <option value="title_proposal">Title Proposal</option>
          <option value="full_document">Full Document</option>
          <option value="imrad">IMRaD</option>
          <option value="presentation">Presentation</option>
          <option value="other">Other</option>
        </select>
        <p id="err-doc-type" class="text-xs text-red-600 mt-1 hidden"></p>
      </div>

      <!-- Drop zone -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2">File <span class="text-red-500">*</span></label>
        <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
          <svg class="w-10 h-10 text-gray-300 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
          <p class="text-sm font-medium text-gray-600">Click to select or drag &amp; drop</p>
          <p class="text-xs text-gray-400 mt-0.5">PDF or DOCX, max 20 MB</p>
        </div>
        <input id="file-input" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" class="hidden">
        <p id="err-file" class="text-xs text-red-600 mt-1 hidden"></p>

        <!-- Selected file preview -->
        <div id="file-preview" class="hidden mt-3 flex items-center gap-3 p-3 bg-blue-50 border border-blue-200 rounded-lg">
          <svg class="w-6 h-6 text-blue-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          <div class="flex-1 min-w-0">
            <p id="file-name" class="text-sm font-medium text-blue-800 truncate"></p>
            <p id="file-size" class="text-xs text-blue-600"></p>
          </div>
          <button onclick="clearFile()" class="text-blue-400 hover:text-blue-600 transition-colors flex-shrink-0">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Upload progress -->
      <div id="progress-wrap" class="hidden mb-4">
        <div class="flex justify-between text-xs text-gray-500 mb-1">
          <span>Uploading…</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="h-2 bg-gray-200 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-primary-500 rounded-full transition-all" style="width:0%"></div>
        </div>
      </div>

      <button id="btn-upload"
        class="w-full py-2.5 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">
        Upload Document
      </button>
    </div>

    <!-- Existing documents -->
    <div id="existing-docs-section" class="hidden mt-5 bg-white rounded-xl border border-gray-200 shadow-sm p-5">
      <h3 class="text-sm font-semibold text-gray-700 mb-3">Existing Documents</h3>
      <div id="existing-docs" class="space-y-2"></div>
    </div>

  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get = path => http(() => apiGet(path));

    let selectedFile = null;

    requireAuthAsync('student').then(async user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || 'Student';

      const locked = await checkGroupAccess(user.id);
      if (!locked) loadSubmissions();
    });

    async function checkGroupAccess(userId) {
      try {
        const res = await apiGet('/api/v1/groups/my').then(r => r.json());
        const group = res.data;
        if (group && group.leader_id !== userId) {
          lockPage();
          return true;
        }
      } catch (_) {}
      return false;
    }

    function lockPage() {
      showAlert('Only group leaders can upload documents. Contact your group leader to upload on behalf of the group.', 'warning');

      ['f-submission', 'f-doc-type', 'btn-upload'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.disabled = true; el.title = 'Only group leaders can upload'; }
      });

      const dz = document.getElementById('drop-zone');
      if (dz) {
        dz.onclick = null;
        dz.style.cursor = 'not-allowed';
        dz.style.opacity = '0.5';
        dz.style.pointerEvents = 'none';
      }
    }

    async function loadSubmissions() {
      // Check if URL has ?id= param "” pre-select that submission
      const params = new URLSearchParams(window.location.search);
      const preId  = params.get('id');

      try {
        const res   = await get('/api/v1/submissions?limit=100');
        const items = res.data?.data || res.data || [];
        const sel   = document.getElementById('f-submission');

        // Only show non-rejected, non-deleted subs
        const allowed = items.filter(s => s.status !== 'rejected');
        allowed.forEach(sub => {
          const opt = document.createElement('option');
          opt.value = sub.id;
          opt.textContent = `${sub.title} (${sub.school_year} Â· ${sub.semester} Â· ${sub.status})`;
          if (String(sub.id) === preId) opt.selected = true;
          sel.appendChild(opt);
        });

        sel.addEventListener('change', onSubmissionChange);
        if (preId) sel.dispatchEvent(new Event('change'));
      } catch(err) {
        showAlert(err?.message || 'Failed to load submissions.');
      }
    }

    async function onSubmissionChange() {
      const id = document.getElementById('f-submission').value;
      if (!id) {
        document.getElementById('sub-detail').classList.add('hidden');
        document.getElementById('upload-section').classList.add('hidden');
        document.getElementById('existing-docs-section').classList.add('hidden');
        return;
      }
      try {
        const res = await get(`/api/v1/submissions/${id}`);
        const sub = res.data;
        const detail = document.getElementById('sub-detail');
        const STATUS_LABELS = {
          draft:'Draft', submitted:'Submitted', under_review:'Under Review',
          revision_required:'Revision Required', approved:'Approved', rejected:'Rejected'
        };
        detail.innerHTML = `<strong>${escHtml(sub.title)}</strong> &mdash; ${sub.type} &middot; ${sub.school_year} &middot; ${sub.semester} Sem &middot; <span class="font-semibold">${STATUS_LABELS[sub.status]||sub.status}</span>`;
        detail.classList.remove('hidden');
        document.getElementById('upload-section').classList.remove('hidden');

        // Existing docs
        if (sub.documents?.length) {
          document.getElementById('existing-docs-section').classList.remove('hidden');
          const container = document.getElementById('existing-docs');
          container.innerHTML = sub.documents.map(d => `
            <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
              <svg class="w-5 h-5 text-primary-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-gray-800 truncate">${escHtml(d.file_name)}</p>
                <p class="text-xs text-gray-500">${d.doc_type.replace(/_/g,' ')} Â· v${d.version} Â· ${formatBytes(d.file_size)}</p>
              </div>
              ${d.is_current ? '<span class="text-xs bg-green-100 text-green-700 font-semibold px-2 py-0.5 rounded-full">Current</span>' : '<span class="text-xs text-gray-400">Archived</span>'}
            </div>`).join('');
        } else {
          document.getElementById('existing-docs-section').classList.add('hidden');
        }
      } catch(err) {
        showAlert(err?.message || 'Failed to load submission details.');
      }
    }

    // Drag & drop
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault(); dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });
    document.getElementById('file-input').addEventListener('change', e => {
      if (e.target.files[0]) setFile(e.target.files[0]);
    });

    function setFile(file) {
      const allowed = ['application/pdf','application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
      if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|docx)$/i)) {
        showFieldErr('err-file', 'Only PDF or DOCX files are allowed.');
        return;
      }
      if (file.size > 20 * 1024 * 1024) {
        showFieldErr('err-file', 'File must be 20 MB or smaller.');
        return;
      }
      hideFieldErr('err-file');
      selectedFile = file;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-size').textContent = formatBytes(file.size);
      document.getElementById('file-preview').classList.remove('hidden');
      dropZone.classList.add('hidden');
    }

    function clearFile() {
      selectedFile = null;
      document.getElementById('file-input').value = '';
      document.getElementById('file-preview').classList.add('hidden');
      dropZone.classList.remove('hidden');
    }

    document.getElementById('btn-upload').addEventListener('click', async () => {
      const subId   = document.getElementById('f-submission').value;
      const docType = document.getElementById('f-doc-type').value;

      let valid = true;
      if (!docType) { showFieldErr('err-doc-type', 'Please select a document type.'); valid = false; }
      else hideFieldErr('err-doc-type');
      if (!selectedFile) { showFieldErr('err-file', 'Please select a file.'); valid = false; }
      else hideFieldErr('err-file');
      if (!subId) { showAlert('Please select a submission first.'); valid = false; }
      if (!valid) return;

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('doc_type', docType);

      const btn = document.getElementById('btn-upload');
      btn.disabled = true; btn.textContent = 'Uploading…';
      document.getElementById('progress-wrap').classList.remove('hidden');

      try {
        // Use XHR for progress tracking
        await uploadWithProgress(`/api/v1/submissions/${subId}/documents`, formData);
        showAlert('Document uploaded successfully!', 'success');
        clearFile();
        document.getElementById('f-doc-type').value = '';
        // Reload docs list
        document.getElementById('f-submission').dispatchEvent(new Event('change'));
      } catch(err) {
        showAlert(err?.message || 'Upload failed. Please try again.');
      } finally {
        btn.disabled = false; btn.textContent = 'Upload Document';
        document.getElementById('progress-wrap').classList.add('hidden');
        document.getElementById('progress-bar').style.width = '0%';
      }
    });

    function uploadWithProgress(url, formData) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const token = getAccessToken();
        xhr.open('POST', url);
        if (token) xhr.setRequestHeader('Authorization', `Bearer ${token}`);
        xhr.withCredentials = true;
        xhr.upload.onprogress = e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-pct').textContent = pct + '%';
          }
        };
        xhr.onload = () => {
          const json = JSON.parse(xhr.responseText);
          if (xhr.status >= 200 && xhr.status < 300) resolve(json);
          else reject(json);
        };
        xhr.onerror = () => reject({ message: 'Network error.' });
        xhr.send(formData);
      });
    }

    function showFieldErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.remove('hidden');
    }
    function hideFieldErr(id) {
      const el = document.getElementById(id);
      el.textContent = ''; el.classList.add('hidden');
    }
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      const styles = {
        success: 'bg-green-50 border border-green-200 text-green-800',
        warning: 'bg-amber-50 border border-amber-200 text-amber-800',
        error:   'bg-red-50 border border-red-200 text-red-800',
      };
      el.className = `mb-5 px-4 py-3 rounded-lg text-sm font-medium ${styles[type] || styles.error}`;
      el.classList.remove('hidden');
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      if (type === 'success') setTimeout(() => el.classList.add('hidden'), 4000);
    }
    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatBytes(b) {
      if (!b) return '';
      if (b < 1024) return `${b} B`;
      if (b < 1048576) return `${(b/1024).toFixed(1)} KB`;
      return `${(b/1048576).toFixed(1)} MB`;
    }
  </script>
</body>
</html>
