<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ACES Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center font-sans relative overflow-hidden">

  <!-- Background image layer -->
  <div style="position:fixed;inset:0;background:url('/assets/img/481469516_2456516118028403_399389140719261991_n.jpg') center/cover no-repeat;filter:blur(6px);transform:scale(1.08);z-index:0;"></div>
  <!-- Light green overlay -->
  <div style="position:fixed;inset:0;background:rgba(34,197,94,0.18);z-index:1;"></div>

  <div class="w-full max-w-md px-4 relative" style="z-index:2;">
    <div class="rounded-2xl shadow-2xl p-8" style="background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">

      <!-- Logo / Header -->
      <div class="text-center mb-8">
        <img src="/assets/img/aw.webp" alt="School Logo" class="w-20 h-20 object-contain mx-auto mb-4">
        <h1 class="text-2xl font-bold text-gray-900">Research Archiving System</h1>
        <p class="text-sm text-gray-500 mt-1">ACES Polytechnic College, Inc.</p>
      </div>

      <!-- Error banner -->
      <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4"></div>

      <!-- Form -->
      <form id="login-form" novalidate>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email address</label>
            <input id="email" name="email" type="email" autocomplete="email" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
              placeholder="you@aces.edu.ph">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
            <div class="relative">
              <input id="password" name="password" type="password" autocomplete="current-password" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 pr-10"
                placeholder="••••••••">
              <button type="button" id="toggle-pw" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="flex items-center justify-end">
            <a href="/pages/forgot-password.html" class="text-sm text-primary-600 hover:underline">Forgot password?</a>
          </div>
        </div>

        <button type="submit" id="submit-btn"
          class="mt-6 w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors disabled:opacity-60">
          Sign in
        </button>
      </form>

    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    // Redirect if already logged in
    restoreSession().then(ok => {
      if (ok) window.location.href = '/';
    });

    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await apiPost('/api/v1/auth/login', { email, password });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.message || 'Login failed.';
          errEl.classList.remove('hidden');
          return;
        }

        setAccessToken(data.data.accessToken);
        const user = getUser();
        const map  = {
          student:    '/pages/student/dashboard.html',
          instructor: '/pages/instructor/dashboard.html',
          admin:      '/pages/admin/dashboard.html',
          panelist:   '/pages/panelist/dashboard.html',
          superadmin: '/pages/superadmin/dashboard.html',
        };
        window.location.href = map[user.role] || '/';

      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
