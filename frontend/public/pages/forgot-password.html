<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — DNSC Research System</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">
  <div class="w-full max-w-md px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Forgot Password</h1>
        <p class="text-sm text-gray-500 mt-1">Enter your email and we'll send a reset link.</p>
      </div>

      <div id="success-msg" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-lg mb-4"></div>
      <div id="error-msg"   class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4"></div>

      <form id="forgot-form" novalidate>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input id="email" type="email" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
            placeholder="you@aces.edu.ph">
        </div>
        <button type="submit" id="submit-btn"
          class="mt-5 w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors disabled:opacity-60">
          Send Reset Link
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <a href="/pages/login.html" class="text-primary-600 hover:underline">Back to login</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn    = document.getElementById('submit-btn');
      const errEl  = document.getElementById('error-msg');
      const succEl = document.getElementById('success-msg');
      errEl.classList.add('hidden'); succEl.classList.add('hidden');
      btn.disabled = true; btn.textContent = 'Sending…';

      try {
        const res  = await apiPost('/api/v1/auth/forgot-password', { email: document.getElementById('email').value.trim() });
        const data = await res.json();
        succEl.textContent = data.message;
        succEl.classList.remove('hidden');
        document.getElementById('forgot-form').reset();
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
