<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructor Dashboard — DNSC Research System</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow">
    <span class="font-bold text-lg">DNSC Research System</span>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Instructor Dashboard</h1>
    <p class="text-gray-500 text-sm mb-8">Monitor your advisees and manage documentation.</p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <a href="/pages/instructor/my-advisees.html" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow">
        <div class="w-10 h-10 bg-blue-100 rounded-lg flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </div>
        <p class="font-semibold text-gray-800">My Advisees</p>
        <p class="text-xs text-gray-500 mt-1">Monitor student progress</p>
      </a>

      <a href="/pages/instructor/upload-adviser-list.html" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow">
        <div class="w-10 h-10 bg-green-100 rounded-lg flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        </div>
        <p class="font-semibold text-gray-800">Upload Adviser List</p>
        <p class="text-xs text-gray-500 mt-1">Import student-adviser pairs via CSV</p>
      </a>

      <a href="/pages/instructor/guidelines.html" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow">
        <div class="w-10 h-10 bg-yellow-100 rounded-lg flex items-center justify-center mb-3">
          <svg class="w-5 h-5 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <p class="font-semibold text-gray-800">Guidelines</p>
        <p class="text-xs text-gray-500 mt-1">View and download IMRAD templates</p>
      </a>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    requireAuthAsync('instructor').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = 'Instructor / Adviser';
    });
  </script>
</body>
</html>
