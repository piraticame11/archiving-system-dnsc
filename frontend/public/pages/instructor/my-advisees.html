<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Advisees "” DNSC Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }
    .form-input:focus { border-color:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25); }
    .status-badge { display:inline-flex;align-items:center;padding:.2rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em; }
    tr:hover td { background:#f8fafc; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/instructor/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">DNSC Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">My Advisees</h1>
      <p class="text-sm text-gray-500 mt-0.5">Submissions assigned to you as adviser</p>
    </div>

    <!-- Stats -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6"></div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Filters -->
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-3 mb-5 shadow-sm">
      <div class="relative flex-1 min-w-52">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
        <input id="f-search" type="text" placeholder="Search student name, number, or title…"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <select id="f-status" class="form-input w-auto text-sm py-2">
        <option value="">All Statuses</option>
        <option value="draft">Draft</option>
        <option value="submitted">Submitted</option>
        <option value="under_review">Under Review</option>
        <option value="revision_required">Revision Required</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
      <select id="f-type" class="form-input w-auto text-sm py-2">
        <option value="">All Types</option>
        <option value="thesis">Thesis</option>
        <option value="capstone">Capstone</option>
      </select>
      <button onclick="resetFilters()" class="px-3 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Reset</button>
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Student</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Title</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Type</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Period</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Status</th>
              <th class="text-center px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Docs</th>
              <th class="text-right px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="7" class="px-4 py-8 text-center text-sm text-gray-400">Loading advisees…</td></tr>
          </tbody>
        </table>
      </div>
      <div id="pagination" class="hidden border-t border-gray-200 px-4 py-3 flex items-center justify-between">
        <p id="page-info" class="text-sm text-gray-500"></p>
        <div class="flex gap-2">
          <button id="btn-prev" onclick="changePage(-1)" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Previous</button>
          <button id="btn-next" onclick="changePage(1)"  class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl flex flex-col max-h-[90vh]">
      <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
        <h2 id="modal-title" class="text-lg font-bold text-gray-900">Submission Details</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" class="overflow-y-auto px-6 py-5 space-y-4 flex-1"></div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }
    function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
    function formatBytes(b) {
      if (!b) return '"”';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(1) + ' MB';
    }

    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get = path => http(() => apiGet(path));

    let currentPage = 1;
    let totalPages  = 1;
    let searchTimer = null;

    const STATUS_CONFIG = {
      draft:             { label:'Draft',             bg:'bg-gray-100',   text:'text-gray-700'   },
      submitted:         { label:'Submitted',         bg:'bg-blue-100',   text:'text-blue-700'   },
      under_review:      { label:'Under Review',      bg:'bg-yellow-100', text:'text-yellow-700' },
      revision_required: { label:'Revision Required', bg:'bg-orange-100', text:'text-orange-700' },
      approved:          { label:'Approved',          bg:'bg-green-100',  text:'text-green-700'  },
      rejected:          { label:'Rejected',          bg:'bg-red-100',    text:'text-red-700'    },
    };

    function badge(status) {
      const c = STATUS_CONFIG[status] || { label: status, bg:'bg-gray-100', text:'text-gray-700' };
      return `<span class="status-badge ${c.bg} ${c.text}">${c.label}</span>`;
    }

    requireAuthAsync('instructor').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || user.email;
      loadAdvisees();

      ['f-status', 'f-type'].forEach(id =>
        document.getElementById(id).addEventListener('change', () => { currentPage = 1; loadAdvisees(); }));
      document.getElementById('f-search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadAdvisees(); }, 350);
      });
    });

    async function loadAdvisees() {
      const params = new URLSearchParams({ page: currentPage, limit: 15 });
      const search = document.getElementById('f-search').value.trim();
      const status = document.getElementById('f-status').value;
      const type   = document.getElementById('f-type').value;
      if (search) params.set('search', search);
      if (status) params.set('status', status);
      if (type)   params.set('type', type);

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-sm text-gray-400">Loading…</td></tr>`;

      try {
        const res   = await get(`/api/v1/adviser/my-advisees?${params}`);
        const items = res.data?.data || [];
        totalPages  = res.data?.pagination?.totalPages || 1;
        const total = res.data?.pagination?.total || items.length;

        renderStats(items, total);
        document.getElementById('pagination').classList.toggle('hidden', totalPages <= 1);

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-10 text-center text-sm text-gray-400">No advisees found. Upload an adviser list to get started.</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(s => `
          <tr class="border-b border-gray-100 cursor-pointer" onclick="openModal(${s.id})">
            <td class="px-4 py-3">
              <p class="font-medium text-gray-900">${escHtml(s.first_name + ' ' + s.last_name)}</p>
              <p class="text-xs text-gray-400 mt-0.5">${escHtml(s.student_number || s.student_email || '"”')}</p>
            </td>
            <td class="px-4 py-3 max-w-xs">
              <p class="text-sm text-gray-800 line-clamp-2">${escHtml(s.title)}</p>
              ${s.latest_remarks ? `<p class="text-xs text-gray-400 mt-0.5 truncate italic">"${escHtml(s.latest_remarks)}"</p>` : ''}
            </td>
            <td class="px-4 py-3">
              <span class="inline-flex px-2 py-0.5 rounded text-xs font-semibold bg-indigo-50 text-indigo-700">${s.type}</span>
            </td>
            <td class="px-4 py-3 text-xs text-gray-600 whitespace-nowrap">${escHtml(s.school_year)} Â· ${escHtml(s.semester)}</td>
            <td class="px-4 py-3">${badge(s.status)}</td>
            <td class="px-4 py-3 text-center text-sm text-gray-600">${s.documents_count || 0}</td>
            <td class="px-4 py-3 text-right">
              <button onclick="event.stopPropagation(); openModal(${s.id})"
                class="px-3 py-1.5 text-xs font-semibold text-primary-700 bg-primary-50 hover:bg-primary-100 rounded-lg transition-colors">
                View
              </button>
            </td>
          </tr>`).join('');

        updatePagination();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-6 text-center text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</td></tr>`;
      }
    }

    function renderStats(items, total) {
      const counts = {};
      items.forEach(s => { counts[s.status] = (counts[s.status] || 0) + 1; });
      const cards = [
        { label: 'Total',            value: total,                       color: 'text-primary-700' },
        { label: 'Draft',            value: counts.draft            || 0, color: 'text-gray-600'    },
        { label: 'Submitted',        value: counts.submitted        || 0, color: 'text-blue-700'    },
        { label: 'Under Review',     value: counts.under_review     || 0, color: 'text-yellow-700'  },
        { label: 'Approved',         value: counts.approved         || 0, color: 'text-green-700'   },
        { label: 'Rev. Required',    value: counts.revision_required|| 0, color: 'text-orange-700'  },
      ];
      document.getElementById('stats-row').innerHTML = cards.map(c => `
        <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 shadow-sm">
          <p class="text-xs text-gray-500 mb-0.5">${c.label}</p>
          <p class="text-2xl font-bold ${c.color}">${c.value}</p>
        </div>`).join('');
    }

    async function openModal(submissionId) {
      document.getElementById('modal-title').textContent = 'Loading…';
      document.getElementById('modal-body').innerHTML    = '<p class="text-sm text-gray-400">Loading…</p>';
      document.getElementById('detail-modal').classList.remove('hidden');

      try {
        const res = await get(`/api/v1/submissions/${submissionId}`);
        const sub = res.data;

        document.getElementById('modal-title').textContent = sub.title;
        document.getElementById('modal-body').innerHTML = `
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Student</p>
              <p class="font-medium text-gray-800">${escHtml(sub.student_name)}</p>
              <p class="text-xs text-gray-500">${escHtml(sub.student_number || '"”')}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Status</p>${badge(sub.status)}</div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Type</p><p class="text-gray-800">${escHtml(sub.type)}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Period</p><p class="text-gray-800">${escHtml(sub.school_year)} Â· ${escHtml(sub.semester)}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Department</p><p class="text-gray-800">${escHtml(sub.department_name || '"”')}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Submitted</p><p class="text-gray-800">${formatDate(sub.submitted_at) || '"”'}</p></div>
          </div>
          ${sub.abstract ? `<div><p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Abstract</p><p class="text-sm text-gray-700 leading-relaxed">${escHtml(sub.abstract)}</p></div>` : ''}
          ${sub.keywords ? `<div><p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Keywords</p><p class="text-sm text-gray-700">${escHtml(sub.keywords)}</p></div>` : ''}
          ${sub.documents?.length ? `
            <div>
              <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Documents (${sub.documents.length})</p>
              <div class="space-y-2">
                ${sub.documents.map(d => `
                  <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
                    <svg class="w-5 h-5 text-primary-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm font-medium text-gray-800 truncate">${escHtml(d.file_name)}</p>
                      <p class="text-xs text-gray-500">${d.doc_type.replace(/_/g,' ')} Â· v${d.version} Â· ${formatBytes(d.file_size)}</p>
                    </div>
                    ${d.is_current ? '<span class="text-xs bg-green-100 text-green-700 font-semibold px-2 py-0.5 rounded-full">Current</span>' : ''}
                    <button onclick="viewDoc(${sub.id},${d.id},'${escAttr(d.file_name)}')"
                      class="flex-shrink-0 inline-flex items-center gap-1 text-xs font-medium text-primary-600 hover:text-primary-800 bg-primary-50 hover:bg-primary-100 px-2.5 py-1 rounded-md transition-colors">
                      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                      View
                    </button>
                  </div>`).join('')}
              </div>
            </div>` : ''}
          ${sub.history?.length ? `
            <div>
              <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Status History</p>
              <div class="space-y-2">
                ${sub.history.map(h => `
                  <div class="flex items-start gap-3 text-sm">
                    <div class="w-2 h-2 rounded-full bg-primary-400 mt-1.5 flex-shrink-0"></div>
                    <div>
                      <span class="font-medium">${(h.new_status||'').replace(/_/g,' ')}</span>
                      ${h.remarks ? `<span class="text-gray-500"> "” ${escHtml(h.remarks)}</span>` : ''}
                      <p class="text-xs text-gray-400">${formatDate(h.changed_at)} ${h.changed_by_name ? 'Â· by '+escHtml(h.changed_by_name) : ''}</p>
                    </div>
                  </div>`).join('')}
              </div>
            </div>` : ''}`;
      } catch (err) {
        document.getElementById('modal-body').innerHTML = `<p class="text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</p>`;
      }
    }

    function closeModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    /* doc viewer */
    let _docViewerUrl = null;
    async function viewDoc(subId, docId, fileName) {
      try {
        const res = await fetch(`/api/v1/submissions/${subId}/documents/${docId}/view`, {
          headers: { Authorization: `Bearer ${getAccessToken()}` },
        });
        if (!res.ok) { showAlert('Could not load document.', 'error'); return; }
        if (_docViewerUrl) URL.revokeObjectURL(_docViewerUrl);
        _docViewerUrl = URL.createObjectURL(await res.blob());
        window.open(_docViewerUrl, '_blank');
      } catch (e) { showAlert('Failed to open document.', 'error'); }
    }

    function changePage(dir) {
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      loadAdvisees();
    }

    function updatePagination() {
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
    }

    function resetFilters() {
      document.getElementById('f-search').value = '';
      document.getElementById('f-status').value = '';
      document.getElementById('f-type').value   = '';
      currentPage = 1;
      loadAdvisees();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = type === 'success'
        ? 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200'
        : 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
