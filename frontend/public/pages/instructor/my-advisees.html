<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Advisees – ACES Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }
    .form-input:focus { border-color:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25); }

    .group-row { cursor:pointer; transition: background .12s; }
    .group-row:hover td { background:#f0fdf4; }
    .group-row.open td { background:#f0fdf4; }

    .members-row { display:none; }
    .members-row.open { display:table-row; }

    .chevron { transition: transform .2s; display:inline-block; }
    .chevron.open { transform: rotate(90deg); }

    .member-badge {
      display:inline-flex;align-items:center;gap:.4rem;
      padding:.25rem .65rem;border-radius:9999px;
      font-size:.72rem;font-weight:600;
      background:#e0f2fe;color:#0369a1;
    }
    .leader-badge {
      display:inline-flex;align-items:center;gap:.25rem;
      padding:.15rem .5rem;border-radius:9999px;
      font-size:.68rem;font-weight:700;
      background:#fef9c3;color:#92400e;letter-spacing:.03em;
    }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/instructor/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">ACES Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">My Advisees</h1>
      <p class="text-sm text-gray-500 mt-0.5">Groups that have assigned you as their adviser</p>
    </div>

    <!-- Stats -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6"></div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Search -->
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-3 mb-5 shadow-sm">
      <div class="relative flex-1 min-w-52">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
        <input id="f-search" type="text" placeholder="Search group name, title, or member…"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <button onclick="resetSearch()" class="px-3 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Reset</button>
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide w-8"></th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Group</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Research Title</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Department</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">School Year</th>
              <th class="text-center px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Members</th>
              <th class="text-right px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="7" class="px-4 py-8 text-center text-sm text-gray-400">Loading groups…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }

    let allGroups = [];
    let searchTimer = null;

    requireAuthAsync('instructor').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || user.email;
      loadGroups();

      document.getElementById('f-search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderTable, 300);
      });
    });

    async function loadGroups() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-sm text-gray-400">Loading…</td></tr>`;
      try {
        const res = await apiGet('/api/v1/adviser/my-groups');
        const json = await res.json();
        allGroups = json.data || [];
        renderStats();
        renderTable();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-6 text-center text-sm text-red-500">Failed to load groups.</td></tr>`;
      }
    }

    function renderStats() {
      const totalMembers = allGroups.reduce((s, g) => s + (g.member_count || 0), 0);
      const cards = [
        { label: 'Total Groups',   value: allGroups.length, color: 'text-primary-700' },
        { label: 'Total Members',  value: totalMembers,     color: 'text-blue-700'    },
        { label: 'With Title',     value: allGroups.filter(g => g.title).length, color: 'text-green-700' },
      ];
      document.getElementById('stats-row').innerHTML = cards.map(c => `
        <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 shadow-sm">
          <p class="text-xs text-gray-500 mb-0.5">${c.label}</p>
          <p class="text-2xl font-bold ${c.color}">${c.value}</p>
        </div>`).join('');
    }

    function renderTable() {
      const q = document.getElementById('f-search').value.trim().toLowerCase();
      const tbody = document.getElementById('table-body');

      const filtered = q
        ? allGroups.filter(g =>
            (g.name||'').toLowerCase().includes(q) ||
            (g.title||'').toLowerCase().includes(q) ||
            (g.department_name||'').toLowerCase().includes(q) ||
            (g.members||[]).some(m =>
              (m.name||'').toLowerCase().includes(q) ||
              (m.student_number||'').toLowerCase().includes(q)
            )
          )
        : allGroups;

      if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center">
          <div class="flex flex-col items-center gap-2">
            <svg class="w-10 h-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <p class="text-sm font-medium text-gray-500">${q ? 'No groups match your search.' : 'No groups assigned to you yet.'}</p>
            ${!q ? '<p class="text-xs text-gray-400">Students can assign you as their adviser when creating a group.</p>' : ''}
          </div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map((g, i) => `
        <tr class="group-row border-b border-gray-100" id="group-row-${i}" onclick="toggleGroup(${i})">
          <td class="px-4 py-3 text-gray-400">
            <svg class="w-4 h-4 chevron" id="chevron-${i}" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </td>
          <td class="px-4 py-3">
            <p class="font-semibold text-gray-900">${escHtml(g.name)}</p>
            <p class="text-xs text-gray-400 mt-0.5">Leader: ${escHtml(g.leader_name)}</p>
          </td>
          <td class="px-4 py-3 max-w-xs">
            ${g.title
              ? `<p class="text-sm text-gray-800 line-clamp-2">${escHtml(g.title)}</p>`
              : `<span class="text-xs italic text-gray-400">No title yet</span>`}
          </td>
          <td class="px-4 py-3 text-sm text-gray-600">${escHtml(g.department_name || '—')}</td>
          <td class="px-4 py-3 text-sm text-gray-600 whitespace-nowrap">${escHtml(g.school_year || '—')}</td>
          <td class="px-4 py-3 text-center">
            <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-primary-100 text-primary-700 font-bold text-xs">
              ${g.member_count || 0}
            </span>
          </td>
          <td class="px-4 py-3 text-right">
            <button onclick="event.stopPropagation(); confirmRemove(${g.id}, '${escHtml(g.name)}')"
              class="px-3 py-1.5 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
              Remove
            </button>
          </td>
        </tr>
        <tr class="members-row" id="members-row-${i}">
          <td colspan="7" class="px-0 py-0 border-b border-gray-100">
            <div class="bg-gray-50 border-t border-gray-100 px-6 py-4">
              ${buildMembersPanel(g)}
            </div>
          </td>
        </tr>`).join('');
    }

    function buildMembersPanel(g) {
      if (!g.members || !g.members.length) {
        return `<p class="text-sm text-gray-400 italic">No members yet.</p>`;
      }
      const rows = g.members.map(m => `
        <tr class="border-b border-gray-200 last:border-0">
          <td class="py-2 pr-6">
            <div class="flex items-center gap-2">
              <span class="font-medium text-gray-800 text-sm">${escHtml(m.name)}</span>
              ${m.student_id === g.leader_id
                ? `<span class="leader-badge">Leader</span>`
                : ''}
            </div>
          </td>
          <td class="py-2 pr-6 text-xs text-gray-500">${escHtml(m.student_number || '—')}</td>
          <td class="py-2 text-xs text-gray-500">${escHtml(m.email || '—')}</td>
        </tr>`).join('');

      return `
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Members (${g.members.length} / ${g.max_members})</p>
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-200">
              <th class="text-left pb-2 text-xs font-semibold text-gray-500">Name</th>
              <th class="text-left pb-2 text-xs font-semibold text-gray-500">Student No.</th>
              <th class="text-left pb-2 text-xs font-semibold text-gray-500">Email</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function toggleGroup(i) {
      const row     = document.getElementById(`group-row-${i}`);
      const members = document.getElementById(`members-row-${i}`);
      const chevron = document.getElementById(`chevron-${i}`);
      const isOpen  = members.classList.contains('open');

      members.classList.toggle('open', !isOpen);
      chevron.classList.toggle('open', !isOpen);
      row.classList.toggle('open', !isOpen);
    }

    function resetSearch() {
      document.getElementById('f-search').value = '';
      renderTable();
    }

    async function confirmRemove(groupId, groupName) {
      if (!confirm(`Remove yourself as adviser from "${groupName}"?\n\nThe group will remain but will have no adviser assigned.`)) return;
      try {
        const res = await apiDelete(`/api/v1/adviser/my-groups/${groupId}`);
        const json = await res.json();
        if (!res.ok) throw json;
        showAlert(json.message || 'Removed successfully.', 'success');
        await loadGroups();
      } catch (err) {
        showAlert(err?.message || 'Failed to remove group.', 'error');
      }
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = type === 'success'
        ? 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200'
        : 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
