№╗┐<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panelists "РђЮ DNSC Research System</title>

  <link rel="stylesheet" href="/assets/css/app.css">

  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }

<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/admin/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">DNSC Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page header -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Panelists</h1>
        <p class="text-sm text-gray-500 mt-0.5">Manage thesis defense panelist accounts</p>
      </div>
      <button id="btn-add" onclick="openAddModal()"
        class="inline-flex items-center gap-2 px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors shadow-sm superadmin-only hidden">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Panelist
      </button>
    </div>

    <!-- Stats row -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-3 gap-3 mb-6"></div>

    <!-- Alert -->

    <!-- Filters -->
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-3 mb-5 shadow-sm">
      <div class="relative flex-1 min-w-52">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
        <input id="f-search" type="text" placeholder="Search name or emailРђд"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <select id="f-status" class="form-input w-auto text-sm py-2">
        <option value="">All Statuses</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      <button onclick="resetFilters()" class="px-3 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Reset</button>
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Name / Email</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Status</th>
              <th class="text-center px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Schedules</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Joined</th>
              <th class="text-right px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr id="loading-row">
              <td colspan="5" class="px-4 py-8 text-center text-sm text-gray-400">Loading panelistsРђд</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="hidden border-t border-gray-200 px-4 py-3 flex items-center justify-between">
        <p id="page-info" class="text-sm text-gray-500"></p>
        <div class="flex gap-2">
          <button id="btn-prev" onclick="changePage(-1)" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Previous</button>
          <button id="btn-next" onclick="changePage(1)"  class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add / Edit Modal -->
  <div id="form-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100">
        <h2 id="form-modal-title" class="text-lg font-bold text-gray-900">Add Panelist</h2>
        <button onclick="closeFormModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name <span class="text-red-500">*</span></label>
            <input id="f-first-name" type="text" class="form-input" placeholder="Juan">
            <p id="err-first-name" class="text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name <span class="text-red-500">*</span></label>
            <input id="f-last-name" type="text" class="form-input" placeholder="Dela Cruz">
            <p id="err-last-name" class="text-xs text-red-600 mt-1 hidden"></p>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
          <input id="f-email" type="email" class="form-input" placeholder="panelist@dnsc.edu.ph">
          <p id="err-email" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>
        <div id="password-section">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-red-500">*</span></label>
          <input id="f-password" type="password" class="form-input" placeholder="Min. 8 characters">
          <p id="err-f-password" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>
      </div>
      <div id="form-alert" class="hidden mx-6 mb-4 px-3 py-2 rounded-lg text-sm text-red-700 bg-red-50 border border-red-200"></div>
      <div class="px-6 pb-6 flex gap-3">
        <button onclick="closeFormModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
        <button id="btn-save-form" onclick="submitForm()" class="flex-1 px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Save</button>
      </div>
    </div>
  </div>

  <!-- Reset Password Modal -->
  <div id="reset-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-bold text-gray-900">Reset Password</h2>
        <button onclick="closeResetModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="mb-4">
        <p class="text-sm text-gray-500 mb-0.5">Panelist</p>
        <p id="reset-name" class="font-medium text-gray-900 text-sm"></p>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">New Password <span class="text-red-500">*</span></label>
        <input id="reset-password" type="password" placeholder="Min. 8 characters" class="form-input">
        <p id="err-reset-pw" class="text-xs text-red-600 mt-1 hidden"></p>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password <span class="text-red-500">*</span></label>
        <input id="reset-confirm" type="password" placeholder="Re-enter new password" class="form-input">
        <p id="err-reset-cf" class="text-xs text-red-600 mt-1 hidden"></p>
      </div>
      <div id="reset-alert" class="hidden mb-4 px-3 py-2 rounded-lg text-sm text-red-700 bg-red-50 border border-red-200"></div>
      <div class="flex gap-3">
        <button onclick="closeResetModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
        <button onclick="submitResetPassword()" class="flex-1 px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Reset Password</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal (assigned schedules) -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl flex flex-col max-h-[90vh]">
      <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
        <h2 id="detail-title" class="text-lg font-bold text-gray-900">Panelist Details</h2>
        <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detail-body" class="overflow-y-auto px-6 py-5 space-y-5 flex-1"></div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }
    function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get   = path      => http(() => apiGet(path));
    const post  = (path, b) => http(() => apiPost(path, b));
    const patch = (path, b) => http(() => apiPatch(path, b));
    const del   = path      => http(() => apiDelete(path));

    let currentPage = 1;
    let totalPages  = 1;
    let searchTimer = null;
    let editId      = null;
    let resetId     = null;
    let currentRole = null;

    const STATUS_COLORS = {
      scheduled:   'bg-blue-100 text-blue-700',
      completed:   'bg-green-100 text-green-700',
      cancelled:   'bg-red-100 text-red-700',
      rescheduled: 'bg-yellow-100 text-yellow-700',
    };

    function statusBadge(active) {
      return active
        ? `<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">Active</span>`
        : `<span class="inline-flex px-2 py-0.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-600">Inactive</span>`;
    }

    requireAuthAsync('admin', 'superadmin').then(user => {
      if (!user) return;
      currentRole = user.role;
      document.getElementById('user-name').textContent = user.full_name || user.email;

      if (user.role === 'superadmin') {
        document.querySelectorAll('.superadmin-only').forEach(el => el.classList.remove('hidden'));
      }

      loadPanelists();
      document.getElementById('f-status').addEventListener('change', () => { currentPage = 1; loadPanelists(); });
      document.getElementById('f-search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadPanelists(); }, 350);
      });
    });

    async function loadPanelists() {
      const params = new URLSearchParams({ page: currentPage, limit: 15 });
      const search = document.getElementById('f-search').value.trim();
      const status = document.getElementById('f-status').value;
      if (search) params.set('search', search);
      if (status) params.set('status', status);

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-gray-400">LoadingРђд</td></tr>`;

      try {
        const res   = await get(`/api/v1/panelists?${params}`);
        const items = res.data?.data || [];
        totalPages  = res.data?.pagination?.totalPages || 1;
        const total = res.data?.pagination?.total || items.length;

        renderStats(items, total);
        document.getElementById('pagination').classList.toggle('hidden', totalPages <= 1);

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-10 text-center text-sm text-gray-400">No panelists found</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(p => `
          <tr class="border-b border-gray-100">
            <td class="px-4 py-3">
              <p class="font-medium text-gray-900">${escHtml(p.first_name + ' ' + p.last_name)}</p>
              <p class="text-xs text-gray-400 mt-0.5">${escHtml(p.email)}</p>
            </td>
            <td class="px-4 py-3">${statusBadge(p.is_active)}</td>
            <td class="px-4 py-3 text-center">
              <button onclick="openDetailModal(${p.id})"
                class="inline-flex items-center gap-1 text-sm font-semibold text-primary-600 hover:text-primary-800 transition-colors">
                ${p.schedules_count}
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
              </button>
            </td>
            <td class="px-4 py-3 text-sm text-gray-500">${formatDate(p.created_at)}</td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-end gap-2 flex-wrap">
                <button onclick="openDetailModal(${p.id})"
                  class="px-3 py-1.5 text-xs font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                  View
                </button>
                ${currentRole === 'superadmin' ? `
                <button onclick="openEditModal(${p.id}, '${escAttr(p.first_name)}', '${escAttr(p.last_name)}', '${escAttr(p.email)}')"
                  class="px-3 py-1.5 text-xs font-semibold text-primary-700 bg-primary-50 hover:bg-primary-100 rounded-lg transition-colors">
                  Edit
                </button>` : ''}
                <button onclick="doToggleActive(${p.id}, ${p.is_active})"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors ${p.is_active
                    ? 'bg-red-50 text-red-600 hover:bg-red-100'
                    : 'bg-green-50 text-green-700 hover:bg-green-100'}">
                  ${p.is_active ? 'Deactivate' : 'Activate'}
                </button>
                <button onclick="openResetModal(${p.id}, '${escAttr(p.first_name + ' ' + p.last_name)}')"
                  class="px-3 py-1.5 text-xs font-semibold text-yellow-700 bg-yellow-50 hover:bg-yellow-100 rounded-lg transition-colors">
                  Reset PW
                </button>
              </div>
            </td>
          </tr>`).join('');

        updatePagination();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-6 text-center text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</td></tr>`;
      }
    }

    function renderStats(items, total) {
      const active   = items.filter(p => p.is_active).length;
      const inactive = items.filter(p => !p.is_active).length;
      const cards = [
        { label: 'Total',    value: total,    color: 'text-primary-700' },
        { label: 'Active',   value: active,   color: 'text-green-700'   },
        { label: 'Inactive', value: inactive, color: 'text-gray-500'    },
      ];
      document.getElementById('stats-row').innerHTML = cards.map(c => `
        <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 shadow-sm">
          <p class="text-xs text-gray-500 mb-0.5">${c.label}</p>
          <p class="text-2xl font-bold ${c.color}">${c.value}</p>
        </div>`).join('');
    }

    function changePage(dir) {
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      loadPanelists();
    }

    function updatePagination() {
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
    }

    function resetFilters() {
      document.getElementById('f-search').value = '';
      document.getElementById('f-status').value = '';
      currentPage = 1;
      loadPanelists();
    }

    /* ├бРђЮРѓг├бРђЮРѓг Add / Edit Modal ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
    function openAddModal() {
      editId = null;
      document.getElementById('form-modal-title').textContent = 'Add Panelist';
      document.getElementById('f-first-name').value = '';
      document.getElementById('f-last-name').value  = '';
      document.getElementById('f-email').value      = '';
      document.getElementById('f-password').value   = '';
      document.getElementById('password-section').classList.remove('hidden');
      clearFormErrors();
      document.getElementById('form-modal').classList.remove('hidden');
    }

    function openEditModal(id, firstName, lastName, email) {
      editId = id;
      document.getElementById('form-modal-title').textContent = 'Edit Panelist';
      document.getElementById('f-first-name').value = firstName;
      document.getElementById('f-last-name').value  = lastName;
      document.getElementById('f-email').value      = email;
      document.getElementById('password-section').classList.add('hidden');
      clearFormErrors();
      document.getElementById('form-modal').classList.remove('hidden');
    }

    function closeFormModal() { document.getElementById('form-modal').classList.add('hidden'); }

    function clearFormErrors() {
      ['err-first-name','err-last-name','err-email','err-f-password'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = ''; el.classList.add('hidden'); }
      });
      document.getElementById('form-alert').classList.add('hidden');
    }

    async function submitForm() {
      clearFormErrors();
      const firstName = document.getElementById('f-first-name').value.trim();
      const lastName  = document.getElementById('f-last-name').value.trim();
      const email     = document.getElementById('f-email').value.trim();
      const password  = document.getElementById('f-password')?.value;

      let valid = true;
      if (!firstName) { showFieldErr('err-first-name', 'Required'); valid = false; }
      if (!lastName)  { showFieldErr('err-last-name',  'Required'); valid = false; }
      if (!email)     { showFieldErr('err-email', 'Required'); valid = false; }
      if (!editId && (!password || password.length < 8)) {
        showFieldErr('err-f-password', 'At least 8 characters'); valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('btn-save-form');
      btn.disabled = true; btn.textContent = 'SavingРђд';

      try {
        if (editId) {
          await patch(`/api/v1/panelists/${editId}`, { first_name: firstName, last_name: lastName, email });
          showAlert('Panelist updated.', 'success');
        } else {
          await post('/api/v1/panelists', { first_name: firstName, last_name: lastName, email, password });
          showAlert('Panelist created.', 'success');
        }
        closeFormModal();
        loadPanelists();
      } catch (err) {
        document.getElementById('form-alert').textContent = err?.message || 'Failed to save.';
        document.getElementById('form-alert').classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Save';
      }
    }

    function showFieldErr(id, msg) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    /* ├бРђЮРѓг├бРђЮРѓг Toggle Active ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
    async function doToggleActive(id, isActive) {
      const action = isActive ? 'deactivate' : 'activate';
      if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} this panelist?`)) return;
      try {
        await patch(`/api/v1/panelists/${id}/toggle-active`, {});
        showAlert(`Panelist ${action}d successfully.`, 'success');
        loadPanelists();
      } catch (err) {
        showAlert(err?.message || 'Failed to update status.', 'error');
      }
    }

    /* ├бРђЮРѓг├бРђЮРѓг Reset Password Modal ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
    function openResetModal(id, name) {
      resetId = id;
      document.getElementById('reset-name').textContent = name;
      document.getElementById('reset-password').value  = '';
      document.getElementById('reset-confirm').value   = '';
      ['err-reset-pw','err-reset-cf'].forEach(id => {
        const el = document.getElementById(id); el.textContent = ''; el.classList.add('hidden');
      });
      document.getElementById('reset-alert').classList.add('hidden');
      document.getElementById('reset-modal').classList.remove('hidden');
    }

    function closeResetModal() { document.getElementById('reset-modal').classList.add('hidden'); resetId = null; }

    async function submitResetPassword() {
      const pw  = document.getElementById('reset-password').value;
      const cf  = document.getElementById('reset-confirm').value;
      let valid = true;
      if (!pw || pw.length < 8) { showFieldErr('err-reset-pw', 'At least 8 characters'); valid = false; }
      if (pw !== cf)            { showFieldErr('err-reset-cf', 'Passwords do not match'); valid = false; }
      if (!valid) return;

      try {
        await post(`/api/v1/panelists/${resetId}/reset-password`, { password: pw });
        showAlert('Password reset successfully.', 'success');
        closeResetModal();
      } catch (err) {
        document.getElementById('reset-alert').textContent = err?.message || 'Failed to reset.';
        document.getElementById('reset-alert').classList.remove('hidden');
      }
    }

    /* ├бРђЮРѓг├бРђЮРѓг Detail Modal ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
    async function openDetailModal(id) {
      document.getElementById('detail-title').textContent = 'LoadingРђд';
      document.getElementById('detail-body').innerHTML   = '<p class="text-sm text-gray-400">LoadingРђд</p>';
      document.getElementById('detail-modal').classList.remove('hidden');

      try {
        const res = await get(`/api/v1/panelists/${id}`);
        const p   = res.data;

        document.getElementById('detail-title').textContent = p.first_name + ' ' + p.last_name;

        const schedHtml = p.schedules?.length
          ? p.schedules.map(s => {
              const sc = STATUS_COLORS[s.status] || 'bg-gray-100 text-gray-700';
              return `
              <div class="flex items-start gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
                <div class="flex-1 min-w-0">
                  <p class="text-sm font-medium text-gray-800 truncate">${escHtml(s.submission_title)}</p>
                  <p class="text-xs text-gray-500 mt-0.5">
                    ${escHtml(s.submission_type || '')} ├ѓ┬и ${s.venue_name ? escHtml(s.venue_name) + ' ├ѓ┬и ' : ''}${formatDate(s.scheduled_at)}
                  </p>
                </div>
                <span class="text-xs font-semibold px-2 py-0.5 rounded-full flex-shrink-0 ${sc}">
                  ${s.status.replace(/_/g,' ')}
                </span>
              </div>`;
            }).join('')
          : '<p class="text-sm text-gray-400 py-2">No assigned schedules.</p>';

        document.getElementById('detail-body').innerHTML = `
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Email</p><p class="text-gray-800">${escHtml(p.email)}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Status</p>${statusBadge(p.is_active)}</div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Joined</p><p class="text-gray-800">${formatDate(p.created_at)}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Schedules</p><p class="text-gray-800 font-semibold">${p.schedules?.length || 0}</p></div>
          </div>
          <div>
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Assigned Schedules</p>
            <div class="space-y-2">${schedHtml}</div>
          </div>`;
      } catch (err) {
        document.getElementById('detail-body').innerHTML = `<p class="text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</p>`;
      }
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    /* ├бРђЮРѓг├бРђЮРѓг Alert ├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг├бРђЮРѓг */
    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = type === 'success'
        ? 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-green-50 text-green-700 border border-green-200'
        : 'mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200';
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
