<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venues "” ACES Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }
    .form-input:focus { border-color:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25); }
    tr:hover td { background:#f8fafc; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/admin/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">ACES Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page header -->
    <div class="mb-6 flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Venues</h1>
        <p class="text-sm text-gray-500 mt-0.5">Manage defense and presentation venues</p>
      </div>
      <button onclick="openCreateModal()"
        class="flex items-center gap-2 px-4 py-2 text-sm font-semibold bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Venue
      </button>
    </div>

    <!-- Stats row -->
    <div id="stats-row" class="grid grid-cols-3 gap-3 mb-6"></div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Filters -->
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-3 mb-5 shadow-sm">
      <div class="relative flex-1 min-w-52">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
        <input id="f-search" type="text" placeholder="Search name or location…"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
        <input id="f-show-inactive" type="checkbox" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500">
        Show inactive
      </label>
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Name</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Location</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Capacity</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Status</th>
              <th class="text-right px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="5" class="px-4 py-8 text-center text-sm text-gray-400">Loading venues…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="hidden border-t border-gray-200 px-4 py-3 flex items-center justify-between">
        <p id="page-info" class="text-sm text-gray-500"></p>
        <div class="flex gap-2">
          <button id="btn-prev" onclick="changePage(-1)" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Previous</button>
          <button id="btn-next" onclick="changePage(1)"  class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create / Edit Venue Modal -->
  <div id="venue-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 id="modal-title" class="text-lg font-bold text-gray-900">Add Venue</h2>
        <button onclick="closeVenueModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>

      <input type="hidden" id="venue-id">

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-500">*</span></label>
          <input id="v-name" type="text" placeholder="e.g. Conference Room A" class="form-input">
          <p id="err-name" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
          <input id="v-location" type="text" placeholder="e.g. Main Building, Room 201" class="form-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Seats / Capacity
            <span class="text-xs font-normal text-gray-400 ml-1">(optional)</span>
          </label>
          <input id="v-capacity" type="number" min="1" placeholder="e.g. 30" class="form-input">
        </div>
      </div>

      <div id="venue-alert" class="hidden mt-4 px-3 py-2 rounded-lg text-sm text-red-700 bg-red-50 border border-red-200"></div>

      <div class="flex gap-3 mt-5">
        <button onclick="closeVenueModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
        <button id="btn-save-venue" onclick="saveVenue()" class="flex-1 px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Save Venue</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get    = path      => http(() => apiGet(path));
    const post   = (path, b) => http(() => apiPost(path, b));
    const patch  = (path, b) => http(() => apiPatch(path, b));
    const del    = path      => http(() => apiDelete(path));

    let currentPage = 1;
    let totalPages  = 1;
    let searchTimer = null;
    let allVenues   = [];

    requireAuthAsync('admin', 'superadmin').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || user.email;
      loadVenues();

      document.getElementById('f-search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadVenues(); }, 350);
      });
      document.getElementById('f-show-inactive').addEventListener('change', () => {
        currentPage = 1; loadVenues();
      });
    });

    async function loadVenues() {
      const params = new URLSearchParams({ page: currentPage, limit: 15 });
      const search       = document.getElementById('f-search').value.trim();
      const showInactive = document.getElementById('f-show-inactive').checked;
      if (search) params.set('search', search);
      if (!showInactive) params.set('is_active', 'true');

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-gray-400">Loading…</td></tr>`;

      try {
        const res   = await get(`/api/v1/venues?${params}`);
        const items = res.data?.data || [];
        totalPages  = res.data?.pagination?.totalPages || res.data?.totalPages || 1;
        allVenues   = items;

        renderStats(items);
        document.getElementById('pagination').classList.toggle('hidden', totalPages <= 1);

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-10 text-center text-sm text-gray-400">No venues found</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(v => `
          <tr class="border-b border-gray-100">
            <td class="px-4 py-3 font-medium text-gray-900">${escHtml(v.name)}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${escHtml(v.location || '"”')}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${v.capacity ? v.capacity + ' pax' : '"”'}</td>
            <td class="px-4 py-3">
              ${v.is_active
                ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">Active</span>`
                : `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-600">Inactive</span>`}
            </td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-end gap-2">
                <button onclick="openEditModal(${JSON.stringify(v).replace(/"/g,'&quot;')})"
                  class="px-3 py-1.5 text-xs font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                  Edit
                </button>
                <button onclick="toggleVenueActive(${v.id}, ${v.is_active})"
                  class="px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors ${v.is_active
                    ? 'bg-yellow-50 text-yellow-700 hover:bg-yellow-100'
                    : 'bg-green-50 text-green-700 hover:bg-green-100'}">
                  ${v.is_active ? 'Deactivate' : 'Activate'}
                </button>
                <button onclick="deleteVenue(${v.id}, '${escAttr(v.name)}')"
                  class="px-3 py-1.5 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                  Delete
                </button>
              </div>
            </td>
          </tr>`).join('');

        updatePagination();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-6 text-center text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</td></tr>`;
      }
    }

    function renderStats(venues) {
      const total    = venues.length;
      const active   = venues.filter(v => v.is_active).length;
      const inactive = venues.filter(v => !v.is_active).length;
      const cards = [
        { label: 'Total Venues',    value: total,    color: 'text-primary-700' },
        { label: 'Active Venues',   value: active,   color: 'text-green-700'   },
        { label: 'Inactive Venues', value: inactive, color: 'text-gray-600'    },
      ];
      document.getElementById('stats-row').innerHTML = cards.map(c => `
        <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
          <p class="text-xs font-medium text-gray-500 mb-1">${c.label}</p>
          <p class="text-2xl font-bold ${c.color}">${c.value}</p>
        </div>`).join('');
    }

    function openCreateModal() {
      document.getElementById('venue-id').value    = '';
      document.getElementById('v-name').value      = '';
      document.getElementById('v-location').value  = '';
      document.getElementById('v-capacity').value  = '';
      document.getElementById('err-name').classList.add('hidden');
      document.getElementById('venue-alert').classList.add('hidden');
      document.getElementById('modal-title').textContent = 'Add Venue';
      document.getElementById('btn-save-venue').textContent = 'Save Venue';
      document.getElementById('venue-modal').classList.remove('hidden');
    }

    function openEditModal(venue) {
      if (typeof venue === 'string') venue = JSON.parse(venue);
      document.getElementById('venue-id').value    = venue.id;
      document.getElementById('v-name').value      = venue.name || '';
      document.getElementById('v-location').value  = venue.location || '';
      document.getElementById('v-capacity').value  = venue.capacity || '';
      document.getElementById('err-name').classList.add('hidden');
      document.getElementById('venue-alert').classList.add('hidden');
      document.getElementById('modal-title').textContent = 'Edit Venue';
      document.getElementById('btn-save-venue').textContent = 'Save Changes';
      document.getElementById('venue-modal').classList.remove('hidden');
    }

    function closeVenueModal() {
      document.getElementById('venue-modal').classList.add('hidden');
    }

    async function saveVenue() {
      const id       = document.getElementById('venue-id').value;
      const name     = document.getElementById('v-name').value.trim();
      const location = document.getElementById('v-location').value.trim();
      const capacity = document.getElementById('v-capacity').value;
      const errName  = document.getElementById('err-name');
      const alertEl  = document.getElementById('venue-alert');

      errName.classList.add('hidden');
      alertEl.classList.add('hidden');

      if (!name) {
        errName.textContent = 'Venue name is required.';
        errName.classList.remove('hidden');
        return;
      }

      const body = { name };
      if (location) body.location = location;
      if (capacity) body.capacity = parseInt(capacity);

      const btn = document.getElementById('btn-save-venue');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        if (id) {
          await patch(`/api/v1/venues/${id}`, body);
          showAlert('Venue updated successfully.', 'success');
        } else {
          await post('/api/v1/venues', body);
          showAlert('Venue created successfully.', 'success');
        }
        closeVenueModal();
        loadVenues();
      } catch (err) {
        alertEl.textContent = err?.message || 'Failed to save venue.';
        alertEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = id ? 'Save Changes' : 'Save Venue';
      }
    }

    async function toggleVenueActive(id, currentlyActive) {
      try {
        await patch(`/api/v1/venues/${id}/toggle-active`);
        showAlert(`Venue ${currentlyActive ? 'deactivated' : 'activated'} successfully.`, 'success');
        loadVenues();
      } catch (err) {
        showAlert(err?.message || 'Failed to update venue.', 'error');
      }
    }

    async function deleteVenue(id, name) {
      if (!window.confirm(`Delete venue "${name}"? This cannot be undone.`)) return;
      try {
        await del(`/api/v1/venues/${id}`);
        showAlert('Venue deleted.', 'success');
        loadVenues();
      } catch (err) {
        showAlert(err?.message || 'Failed to delete venue.', 'error');
      }
    }

    function updatePagination() {
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
    }

    function changePage(dir) {
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      loadVenues();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${
        type === 'success' ? 'bg-green-50 border border-green-200 text-green-800'
                           : 'bg-red-50 border border-red-200 text-red-800'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escAttr(s) {
      return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
