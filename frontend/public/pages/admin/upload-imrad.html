<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMRAD Templates "” ACES Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }
    .form-input:focus { border-color:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25); }
    tr:hover td { background:#f8fafc; }
    .file-drop { border:2px dashed #d1d5db;border-radius:.75rem;transition:border-color .15s,background .15s; }
    .file-drop:hover, .file-drop.drag-over { border-color:#22c55e;background:#f0fdf4; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/admin/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">ACES Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page header -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">IMRAD Templates</h1>
      <p class="text-sm text-gray-500 mt-0.5">Upload and manage IMRAD template documents for student reference.</p>
    </div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Two-column layout: Upload form left, list right -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Upload Panel -->
      <div class="lg:col-span-1">
        <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5">
          <h2 class="text-base font-semibold text-gray-900 mb-4">Upload Template</h2>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
              <input id="up-title" type="text" placeholder="e.g. IMRAD Template AY 2024-2025" class="form-input">
              <p id="err-title" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
              <textarea id="up-desc" rows="3" placeholder="Brief description of this template…" class="form-input resize-none"></textarea>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">File <span class="text-red-500">*</span></label>
              <div id="file-drop-zone" class="file-drop p-5 text-center cursor-pointer" onclick="document.getElementById('up-file').click()">
                <svg class="w-8 h-8 mx-auto text-gray-400 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <p id="file-label" class="text-sm text-gray-500">Click to browse or drag &amp; drop</p>
                <p class="text-xs text-gray-400 mt-1">PDF or DOCX only</p>
              </div>
              <input id="up-file" type="file" accept=".pdf,.docx" class="hidden">
              <p id="err-file" class="text-xs text-red-600 mt-1 hidden"></p>
            </div>
          </div>

          <!-- Upload progress -->
          <div id="upload-progress" class="hidden mt-4">
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs text-gray-500">Uploading…</span>
              <span id="upload-pct" class="text-xs text-primary-600 font-medium">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-1.5">
              <div id="upload-bar" class="bg-primary-600 h-1.5 rounded-full transition-all" style="width:0%"></div>
            </div>
          </div>

          <div id="upload-alert" class="hidden mt-4 px-3 py-2 rounded-lg text-sm text-red-700 bg-red-50 border border-red-200"></div>

          <button id="btn-upload" onclick="submitUpload()"
            class="mt-5 w-full flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors disabled:opacity-60">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            Upload Template
          </button>
        </div>
      </div>

      <!-- Templates List -->
      <div class="lg:col-span-2">
        <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
            <h2 class="text-base font-semibold text-gray-900">Uploaded Templates</h2>
            <span id="template-count" class="text-xs text-gray-400"></span>
          </div>

          <div id="templates-list">
            <div class="px-5 py-10 text-center text-sm text-gray-400">Loading templates…</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Delete Confirm: handled with window.confirm -->

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get = path => http(() => apiGet(path));
    const del = path => http(() => apiDelete(path));

    requireAuthAsync('admin', 'superadmin').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || user.email;
      loadTemplates();
      setupFileDrop();
    });

    function setupFileDrop() {
      const zone = document.getElementById('file-drop-zone');
      const input = document.getElementById('up-file');

      input.addEventListener('change', () => {
        if (input.files[0]) updateFileLabel(input.files[0]);
      });

      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) {
          const dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          updateFileLabel(file);
        }
      });
    }

    function updateFileLabel(file) {
      document.getElementById('file-label').textContent = `${file.name} (${formatBytes(file.size)})`;
      document.getElementById('file-label').classList.add('text-primary-700', 'font-medium');
      document.getElementById('file-label').classList.remove('text-gray-500');
    }

    async function loadTemplates() {
      const container = document.getElementById('templates-list');
      container.innerHTML = '<div class="px-5 py-10 text-center text-sm text-gray-400">Loading…</div>';
      try {
        const res       = await get('/api/v1/imrad-templates');
        const templates = res.data || [];

        document.getElementById('template-count').textContent = `${templates.length} template${templates.length !== 1 ? 's' : ''}`;

        if (!templates.length) {
          container.innerHTML = `
            <div class="px-5 py-14 text-center">
              <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              <p class="text-sm text-gray-400">No templates uploaded yet.</p>
              <p class="text-xs text-gray-300 mt-0.5">Upload the first IMRAD template using the form on the left.</p>
            </div>`;
          return;
        }

        container.innerHTML = templates.map(t => `
          <div class="flex items-start gap-4 px-5 py-4 border-b border-gray-100 last:border-b-0">
            <!-- File icon -->
            <div class="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center ${t.mime_type?.includes('pdf') ? 'bg-red-100' : 'bg-blue-100'}">
              <svg class="w-5 h-5 ${t.mime_type?.includes('pdf') ? 'text-red-500' : 'text-blue-500'}" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
            </div>
            <!-- Info -->
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-900 truncate">${escHtml(t.title)}</p>
              ${t.description ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-2">${escHtml(t.description)}</p>` : ''}
              <div class="flex flex-wrap items-center gap-3 mt-1.5">
                <span class="text-xs text-gray-400 truncate max-w-xs">${escHtml(t.file_name)}</span>
                ${t.file_size ? `<span class="text-xs text-gray-400">${formatBytes(t.file_size)}</span>` : ''}
                <span class="text-xs text-gray-400">${formatDate(t.created_at)}</span>
                ${t.uploader_name ? `<span class="text-xs text-gray-400">by ${escHtml(t.uploader_name)}</span>` : ''}
              </div>
            </div>
            <!-- Actions -->
            <div class="flex items-center gap-2 flex-shrink-0">
              <button onclick="downloadTemplate(${t.id}, '${escAttr(t.file_name)}')"
                class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-primary-700 bg-primary-50 hover:bg-primary-100 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                Download
              </button>
              <button onclick="deleteTemplate(${t.id}, '${escAttr(t.title)}')"
                class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Delete
              </button>
            </div>
          </div>`).join('');
      } catch (err) {
        container.innerHTML = `<div class="px-5 py-10 text-center text-sm text-red-500">${escHtml(err?.message || 'Failed to load templates.')}</div>`;
      }
    }

    async function submitUpload() {
      const title   = document.getElementById('up-title').value.trim();
      const desc    = document.getElementById('up-desc').value.trim();
      const fileEl  = document.getElementById('up-file');
      const file    = fileEl.files[0];
      const errTitle = document.getElementById('err-title');
      const errFile  = document.getElementById('err-file');
      const alertEl  = document.getElementById('upload-alert');

      errTitle.classList.add('hidden');
      errFile.classList.add('hidden');
      alertEl.classList.add('hidden');

      let valid = true;
      if (!title) { errTitle.textContent = 'Title is required.'; errTitle.classList.remove('hidden'); valid = false; }
      if (!file)  { errFile.textContent  = 'Please select a file.'; errFile.classList.remove('hidden'); valid = false; }
      if (!valid) return;

      const allowed = ['application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
      if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|docx)$/i)) {
        errFile.textContent = 'Only PDF and DOCX files are allowed.';
        errFile.classList.remove('hidden');
        return;
      }

      const formData = new FormData();
      formData.append('title', title);
      if (desc) formData.append('description', desc);
      formData.append('file', file);

      const btn = document.getElementById('btn-upload');
      btn.disabled = true; btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Uploading…';

      document.getElementById('upload-progress').classList.remove('hidden');

      try {
        const res = await uploadTemplate(formData, pct => {
          document.getElementById('upload-bar').style.width = pct + '%';
          document.getElementById('upload-pct').textContent = pct + '%';
        });
        if (!res.ok) {
          const json = await res.json();
          throw json;
        }
        document.getElementById('up-title').value = '';
        document.getElementById('up-desc').value  = '';
        fileEl.value = '';
        document.getElementById('file-label').textContent = 'Click to browse or drag & drop';
        document.getElementById('file-label').classList.remove('text-primary-700', 'font-medium');
        document.getElementById('file-label').classList.add('text-gray-500');
        showAlert('Template uploaded successfully.', 'success');
        loadTemplates();
      } catch (err) {
        alertEl.textContent = err?.message || 'Upload failed. Please try again.';
        alertEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg> Upload Template';
        document.getElementById('upload-progress').classList.add('hidden');
        document.getElementById('upload-bar').style.width = '0%';
        document.getElementById('upload-pct').textContent = '0%';
      }
    }

    function uploadTemplate(formData, onProgress) {
      return new Promise((resolve, reject) => {
        const token = getAccessToken();
        const xhr   = new XMLHttpRequest();
        xhr.open('POST', '/api/v1/imrad-templates');
        xhr.setRequestHeader('Authorization', `Bearer ${token}`);
        if (onProgress) {
          xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
          });
        }
        xhr.onload = () => {
          resolve({ ok: xhr.status >= 200 && xhr.status < 300, json: () => Promise.resolve(JSON.parse(xhr.responseText)) });
        };
        xhr.onerror = () => reject(new Error('Network error during upload.'));
        xhr.send(formData);
      });
    }

    async function downloadTemplate(id, fileName) {
      try {
        const token = getAccessToken();
        const res   = await fetch(`/api/v1/imrad-templates/${id}/download`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) { showAlert('Download failed. Please try again.', 'error'); return; }
        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        showAlert(err?.message || 'Download failed.', 'error');
      }
    }

    async function deleteTemplate(id, title) {
      if (!window.confirm(`Delete template "${title}"? This cannot be undone.`)) return;
      try {
        await del(`/api/v1/imrad-templates/${id}`);
        showAlert('Template deleted.', 'success');
        loadTemplates();
      } catch (err) {
        showAlert(err?.message || 'Failed to delete template.', 'error');
      }
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${
        type === 'success' ? 'bg-green-50 border border-green-200 text-green-800'
                           : 'bg-red-50 border border-red-200 text-red-800'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escAttr(s) {
      return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatDate(d) {
      return d ? new Date(d).toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' }) : '"”';
    }
    function formatBytes(b) {
      if (!b) return '';
      if (b < 1024) return `${b} B`;
      if (b < 1048576) return `${(b / 1024).toFixed(1)} KB`;
      return `${(b / 1048576).toFixed(1)} MB`;
    }
  </script>
</body>
</html>
