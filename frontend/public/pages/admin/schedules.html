<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedules "” DNSC Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }
    .form-input:focus { border-color:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25); }
    tr:hover td { background:#f8fafc; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/admin/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">DNSC Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">

    <!-- Page header -->
    <div class="mb-6 flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Schedules</h1>
        <p class="text-sm text-gray-500 mt-0.5">Schedule and manage thesis and capstone defense sessions</p>
      </div>
      <button onclick="openCreateModal()"
        class="flex items-center gap-2 px-4 py-2 text-sm font-semibold bg-primary-600 hover:bg-primary-700 text-white rounded-lg transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Schedule
      </button>
    </div>

    <!-- Stats row -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-6"></div>

    <!-- Alert -->
    <div id="alert" class="hidden mb-4 px-4 py-3 rounded-lg text-sm font-medium"></div>

    <!-- Filters -->
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-3 mb-5 shadow-sm">
      <div class="relative flex-1 min-w-52">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
        <input id="f-search" type="text" placeholder="Search submission title…"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <select id="f-status" class="form-input w-auto text-sm py-2">
        <option value="">All Statuses</option>
        <option value="scheduled">Scheduled</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
        <option value="rescheduled">Rescheduled</option>
      </select>
      <input id="f-date-from" type="date" class="form-input w-auto text-sm py-2">
      <input id="f-date-to"   type="date" class="form-input w-auto text-sm py-2">
      <button onclick="resetFilters()" class="px-3 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Reset</button>
    </div>

    <!-- Table -->
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b border-gray-200">
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Submission</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Venue</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Date &amp; Time</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Duration</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Panelists</th>
              <th class="text-left px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Status</th>
              <th class="text-right px-4 py-3 font-semibold text-gray-600 text-xs uppercase tracking-wide">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="7" class="px-4 py-8 text-center text-sm text-gray-400">Loading schedules…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="hidden border-t border-gray-200 px-4 py-3 flex items-center justify-between">
        <p id="page-info" class="text-sm text-gray-500"></p>
        <div class="flex gap-2">
          <button id="btn-prev" onclick="changePage(-1)" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Previous</button>
          <button id="btn-next" onclick="changePage(1)"  class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create / Edit Schedule Modal -->
  <div id="schedule-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 id="sched-modal-title" class="text-lg font-bold text-gray-900">Add Schedule</h2>
        <button onclick="closeScheduleModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="overflow-y-auto px-6 py-5 space-y-4 flex-1">
        <input type="hidden" id="sched-id">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Submission <span class="text-red-500">*</span></label>
          <select id="sched-submission" class="form-input">
            <option value="">Loading submissions…</option>
          </select>
          <p id="err-submission" class="text-xs text-red-600 mt-1 hidden"></p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Venue</label>
          <select id="sched-venue" class="form-input">
            <option value="">No venue assigned</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date &amp; Time <span class="text-red-500">*</span></label>
            <input id="sched-datetime" type="datetime-local" class="form-input">
            <p id="err-datetime" class="text-xs text-red-600 mt-1 hidden"></p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Duration (minutes) <span class="text-red-500">*</span></label>
            <input id="sched-duration" type="number" value="60" min="15" max="480" class="form-input">
            <p id="err-duration" class="text-xs text-red-600 mt-1 hidden"></p>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Panelists</label>
          <div id="panelist-list" class="border border-gray-300 rounded-lg p-3 max-h-40 overflow-y-auto space-y-2">
            <p class="text-xs text-gray-400">Loading panelists…</p>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
          <textarea id="sched-notes" rows="3" placeholder="Optional notes or instructions…" class="form-input resize-none"></textarea>
        </div>

        <div id="sched-alert" class="hidden px-3 py-2 rounded-lg text-sm text-red-700 bg-red-50 border border-red-200"></div>
      </div>
      <div class="px-6 py-4 border-t border-gray-100 flex gap-3">
        <button onclick="closeScheduleModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
        <button id="btn-save-sched" onclick="saveSchedule()" class="flex-1 px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Save Schedule</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 class="text-lg font-bold text-gray-900">Schedule Details</h2>
        <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detail-body" class="overflow-y-auto px-6 py-5 space-y-4 flex-1">
        <p class="text-sm text-gray-400 text-center py-8">Loading…</p>
      </div>
      <div class="px-6 py-4 border-t border-gray-100">
        <button onclick="closeDetailModal()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Close</button>
      </div>
    </div>
  </div>

  <!-- Update Status Modal -->
  <div id="status-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-bold text-gray-900">Update Status</h2>
        <button onclick="closeStatusModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="mb-4">
        <p class="text-sm text-gray-500 mb-0.5">Schedule</p>
        <p id="status-sched-title" class="font-medium text-gray-900 text-sm"></p>
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-1">New Status <span class="text-red-500">*</span></label>
        <select id="status-new" class="form-input">
          <option value="scheduled">Scheduled</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="rescheduled">Rescheduled</option>
        </select>
      </div>
      <div id="status-alert" class="hidden mb-4 px-3 py-2 rounded-lg text-sm text-red-700 bg-red-50 border border-red-200"></div>
      <div class="flex gap-3">
        <button onclick="closeStatusModal()" class="flex-1 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Cancel</button>
        <button id="btn-save-status" onclick="submitStatusUpdate()" class="flex-1 px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Update Status</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get    = path      => http(() => apiGet(path));
    const post   = (path, b) => http(() => apiPost(path, b));
    const patch  = (path, b) => http(() => apiPatch(path, b));
    const del    = path      => http(() => apiDelete(path));

    let currentPage   = 1;
    let totalPages    = 1;
    let searchTimer   = null;
    let statusTargetId = null;
    let allSubmissions = [];
    let allVenues      = [];
    let allPanelists   = [];

    const STATUS_CONFIG = {
      scheduled:   { label: 'Scheduled',   bg: 'bg-yellow-100', text: 'text-yellow-700' },
      completed:   { label: 'Completed',   bg: 'bg-blue-100',   text: 'text-blue-700'   },
      cancelled:   { label: 'Cancelled',   bg: 'bg-gray-100',   text: 'text-gray-600'   },
      rescheduled: { label: 'Rescheduled', bg: 'bg-orange-100', text: 'text-orange-700' },
    };

    function statusBadge(s) {
      const c = STATUS_CONFIG[s] || { label: s, bg: 'bg-gray-100', text: 'text-gray-600' };
      return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold ${c.bg} ${c.text}">${c.label}</span>`;
    }

    function typeBadge(t) {
      return t === 'thesis'
        ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-purple-100 text-purple-700">Thesis</span>`
        : `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold bg-cyan-100 text-cyan-700">Capstone</span>`;
    }

    function toDatetimeLocal(iso) {
      if (!iso) return '';
      return new Date(iso).toISOString().slice(0, 16);
    }

    function formatDateTime(iso) {
      if (!iso) return '"”';
      return new Date(iso).toLocaleString('en-PH', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    requireAuthAsync('admin', 'superadmin').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || user.email;
      loadSchedules();
      prefetchDropdowns();

      ['f-status', 'f-date-from', 'f-date-to'].forEach(id =>
        document.getElementById(id).addEventListener('change', () => { currentPage = 1; loadSchedules(); }));
      document.getElementById('f-search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadSchedules(); }, 350);
      });
    });

    async function prefetchDropdowns() {
      try {
        const [subRes, venueRes, panelistRes] = await Promise.all([
          get('/api/v1/submissions?status=approved&limit=100'),
          get('/api/v1/venues?limit=100'),
          get('/api/v1/users?role=panelist&limit=100'),
        ]);
        allSubmissions = subRes.data?.data   || subRes.data   || [];
        allVenues      = venueRes.data?.data || venueRes.data || [];
        allPanelists   = panelistRes.data?.data || panelistRes.data || [];
      } catch (_) {}
    }

    async function loadSchedules() {
      const params = new URLSearchParams({ page: currentPage, limit: 15 });
      const search   = document.getElementById('f-search').value.trim();
      const status   = document.getElementById('f-status').value;
      const dateFrom = document.getElementById('f-date-from').value;
      const dateTo   = document.getElementById('f-date-to').value;
      if (search)   params.set('search', search);
      if (status)   params.set('status', status);
      if (dateFrom) params.set('from_date', dateFrom);
      if (dateTo)   params.set('to_date', dateTo);

      const tbody = document.getElementById('table-body');
      tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-sm text-gray-400">Loading…</td></tr>`;

      try {
        const res   = await get(`/api/v1/schedules?${params}`);
        const items = res.data?.data || [];
        totalPages  = res.data?.pagination?.totalPages || res.data?.totalPages || 1;

        renderStats(items, res.data?.pagination?.total || items.length);
        document.getElementById('pagination').classList.toggle('hidden', totalPages <= 1);

        if (!items.length) {
          tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-10 text-center text-sm text-gray-400">No schedules found</td></tr>`;
          return;
        }

        tbody.innerHTML = items.map(s => `
          <tr class="border-b border-gray-100">
            <td class="px-4 py-3">
              <p class="font-medium text-gray-900 max-w-xs truncate">${escHtml(s.submission_title || '"”')}</p>
              <div class="mt-0.5">${s.submission_type ? typeBadge(s.submission_type) : ''}</div>
            </td>
            <td class="px-4 py-3 text-sm text-gray-600">${escHtml(s.venue_name || 'TBD')}</td>
            <td class="px-4 py-3 text-sm text-gray-700">${formatDateTime(s.scheduled_at)}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${s.duration_min ? s.duration_min + ' min' : '"”'}</td>
            <td class="px-4 py-3 text-sm text-gray-600">${s.panelists_count ?? 0}</td>
            <td class="px-4 py-3">${statusBadge(s.status)}</td>
            <td class="px-4 py-3">
              <div class="flex items-center justify-end gap-1.5">
                <button onclick="openDetailModal(${s.id})"
                  class="px-2.5 py-1.5 text-xs font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                  View
                </button>
                <button onclick="openEditModal(${s.id})"
                  class="px-2.5 py-1.5 text-xs font-semibold text-primary-700 bg-primary-50 hover:bg-primary-100 rounded-lg transition-colors">
                  Edit
                </button>
                <button onclick="openStatusModal(${s.id}, '${escAttr(s.submission_title || '')}', '${s.status}')"
                  class="px-2.5 py-1.5 text-xs font-semibold text-indigo-700 bg-indigo-50 hover:bg-indigo-100 rounded-lg transition-colors">
                  Status
                </button>
                <button onclick="deleteSchedule(${s.id}, '${escAttr(s.submission_title || '')}')"
                  class="px-2.5 py-1.5 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors">
                  Delete
                </button>
              </div>
            </td>
          </tr>`).join('');

        updatePagination();
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-6 text-center text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</td></tr>`;
      }
    }

    function renderStats(items, total) {
      const counts = { pending: 0, confirmed: 0, completed: 0, cancelled: 0 };
      items.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });
      const cards = [
        { label: 'Total',     value: items.length,      color: 'text-primary-700' },
        { label: 'Pending',   value: counts.pending,    color: 'text-yellow-700'  },
        { label: 'Confirmed', value: counts.confirmed,  color: 'text-green-700'   },
        { label: 'Completed', value: counts.completed,  color: 'text-blue-700'    },
        { label: 'Cancelled', value: counts.cancelled,  color: 'text-gray-600'    },
      ];
      document.getElementById('stats-row').innerHTML = cards.map(c => `
        <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm">
          <p class="text-xs font-medium text-gray-500 mb-1">${c.label}</p>
          <p class="text-2xl font-bold ${c.color}">${c.value}</p>
        </div>`).join('');
    }

    function populateScheduleForm(schedule) {
      // Submissions dropdown
      const subSel = document.getElementById('sched-submission');
      subSel.innerHTML = '<option value="">Select approved submission…</option>';
      allSubmissions.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.title} (${s.type || ''} Â· ${s.school_year || ''})`;
        if (schedule && s.id === schedule.submission_id) opt.selected = true;
        subSel.appendChild(opt);
      });

      // Venues dropdown
      const venSel = document.getElementById('sched-venue');
      venSel.innerHTML = '<option value="">No venue assigned</option>';
      allVenues.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.id;
        opt.textContent = v.name + (v.location ? ` "” ${v.location}` : '');
        if (schedule && v.id === schedule.venue_id) opt.selected = true;
        venSel.appendChild(opt);
      });

      // Panelists checkboxes
      const pList = document.getElementById('panelist-list');
      if (!allPanelists.length) {
        pList.innerHTML = '<p class="text-xs text-gray-400">No panelists available.</p>';
      } else {
        const selected = new Set((schedule?.panelists || []).map(p => p.id));
        pList.innerHTML = allPanelists.map(p => `
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="panelist" value="${p.id}" class="rounded border-gray-300 text-primary-600 focus:ring-primary-500"
              ${selected.has(p.id) ? 'checked' : ''}>
            <span class="text-sm text-gray-700">${escHtml(p.first_name + ' ' + p.last_name)}</span>
            <span class="text-xs text-gray-400">${escHtml(p.email || '')}</span>
          </label>`).join('');
      }
    }

    function openCreateModal() {
      document.getElementById('sched-id').value          = '';
      document.getElementById('sched-datetime').value    = '';
      document.getElementById('sched-duration').value    = '60';
      document.getElementById('sched-notes').value       = '';
      document.getElementById('err-submission').classList.add('hidden');
      document.getElementById('err-datetime').classList.add('hidden');
      document.getElementById('err-duration').classList.add('hidden');
      document.getElementById('sched-alert').classList.add('hidden');
      document.getElementById('sched-modal-title').textContent = 'Add Schedule';
      document.getElementById('btn-save-sched').textContent    = 'Save Schedule';
      populateScheduleForm(null);
      document.getElementById('schedule-modal').classList.remove('hidden');
    }

    async function openEditModal(id) {
      document.getElementById('sched-id').value = id;
      document.getElementById('sched-modal-title').textContent = 'Edit Schedule';
      document.getElementById('btn-save-sched').textContent    = 'Save Changes';
      document.getElementById('sched-alert').classList.add('hidden');
      document.getElementById('schedule-modal').classList.remove('hidden');
      try {
        const res = await get(`/api/v1/schedules/${id}`);
        const s   = res.data;
        populateScheduleForm(s);
        document.getElementById('sched-datetime').value = toDatetimeLocal(s.scheduled_at);
        document.getElementById('sched-duration').value = s.duration_min || 60;
        document.getElementById('sched-notes').value    = s.notes || '';
      } catch (err) {
        document.getElementById('sched-alert').textContent = err?.message || 'Failed to load.';
        document.getElementById('sched-alert').classList.remove('hidden');
      }
    }

    function closeScheduleModal() {
      document.getElementById('schedule-modal').classList.add('hidden');
    }

    async function saveSchedule() {
      const id             = document.getElementById('sched-id').value;
      const submissionId   = document.getElementById('sched-submission').value;
      const venueId        = document.getElementById('sched-venue').value;
      const scheduledAt    = document.getElementById('sched-datetime').value;
      const duration       = document.getElementById('sched-duration').value;  // maps to duration_min
      const notes          = document.getElementById('sched-notes').value.trim();
      const panelistChecks = document.querySelectorAll('#panelist-list input[type=checkbox]:checked');
      const panelistIds    = [...panelistChecks].map(c => parseInt(c.value));

      let valid = true;
      [['err-submission', submissionId, 'Please select a submission.'],
       ['err-datetime',   scheduledAt,  'Please select a date and time.'],
       ['err-duration',   duration,     'Please enter a duration.']
      ].forEach(([errId, val, msg]) => {
        const el = document.getElementById(errId);
        if (!val) { el.textContent = msg; el.classList.remove('hidden'); valid = false; }
        else el.classList.add('hidden');
      });
      if (!valid) return;

      const body = {
        submission_id: parseInt(submissionId),
        venue_id:      venueId ? parseInt(venueId) : null,
        scheduled_at:  new Date(scheduledAt).toISOString(),
        duration_min:  parseInt(duration),
        notes:         notes || null,
        panelist_ids:  panelistIds,
      };

      const alertEl = document.getElementById('sched-alert');
      alertEl.classList.add('hidden');
      const btn = document.getElementById('btn-save-sched');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        if (id) {
          await patch(`/api/v1/schedules/${id}`, body);
          showAlert('Schedule updated successfully.', 'success');
        } else {
          await post('/api/v1/schedules', body);
          showAlert('Schedule created successfully.', 'success');
        }
        closeScheduleModal();
        loadSchedules();
      } catch (err) {
        alertEl.textContent = err?.message || 'Failed to save schedule.';
        alertEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = id ? 'Save Changes' : 'Save Schedule';
      }
    }

    async function openDetailModal(id) {
      document.getElementById('detail-body').innerHTML = '<p class="text-sm text-gray-400 text-center py-8">Loading…</p>';
      document.getElementById('detail-modal').classList.remove('hidden');
      try {
        const res = await get(`/api/v1/schedules/${id}`);
        const s   = res.data;
        document.getElementById('detail-body').innerHTML = `
          <div>
            <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-1">Submission</p>
            <p class="font-semibold text-gray-900">${escHtml(s.submission_title || '"”')}</p>
            ${s.submission_type ? `<div class="mt-1">${typeBadge(s.submission_type)}</div>` : ''}
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <p class="text-xs text-gray-400 uppercase mb-0.5">School Year</p>
              <p class="text-sm font-medium">${escHtml(s.school_year || '"”')}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 uppercase mb-0.5">Status</p>
              ${statusBadge(s.status)}
            </div>
            <div>
              <p class="text-xs text-gray-400 uppercase mb-0.5">Venue</p>
              <p class="text-sm font-medium">${escHtml(s.venue_name || 'TBD')}</p>
            </div>
            <div>
              <p class="text-xs text-gray-400 uppercase mb-0.5">Duration</p>
              <p class="text-sm font-medium">${s.duration_min ? s.duration_min + ' minutes' : '"”'}</p>
            </div>
            <div class="col-span-2">
              <p class="text-xs text-gray-400 uppercase mb-0.5">Date &amp; Time</p>
              <p class="text-sm font-medium">${formatDateTime(s.scheduled_at)}</p>
            </div>
          </div>
          ${s.panelists?.length ? `
            <div>
              <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">Panelists (${s.panelists.length})</p>
              <div class="space-y-1.5">
                ${s.panelists.map(p => `
                  <div class="flex items-center gap-2 text-sm">
                    <div class="w-2 h-2 rounded-full bg-primary-400 flex-shrink-0"></div>
                    <span class="font-medium text-gray-800">${escHtml(p.full_name || '')}</span>
                    <span class="text-gray-400 text-xs">${escHtml(p.email || '')}</span>
                  </div>`).join('')}
              </div>
            </div>` : ''}
          ${s.notes ? `
            <div>
              <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-1">Notes</p>
              <p class="text-sm text-gray-700">${escHtml(s.notes)}</p>
            </div>` : ''}`;
      } catch (err) {
        document.getElementById('detail-body').innerHTML = `<p class="text-sm text-red-600">${escHtml(err?.message || 'Failed to load.')}</p>`;
      }
    }

    function closeDetailModal() {
      document.getElementById('detail-modal').classList.add('hidden');
    }

    function openStatusModal(id, title, currentStatus) {
      statusTargetId = id;
      document.getElementById('status-sched-title').textContent = title;
      document.getElementById('status-new').value = currentStatus;
      document.getElementById('status-alert').classList.add('hidden');
      document.getElementById('status-modal').classList.remove('hidden');
    }

    function closeStatusModal() {
      document.getElementById('status-modal').classList.add('hidden');
      statusTargetId = null;
    }

    async function submitStatusUpdate() {
      const status  = document.getElementById('status-new').value;
      const alertEl = document.getElementById('status-alert');
      alertEl.classList.add('hidden');
      const btn = document.getElementById('btn-save-status');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await patch(`/api/v1/schedules/${statusTargetId}/status`, { status });
        closeStatusModal();
        showAlert('Status updated successfully.', 'success');
        loadSchedules();
      } catch (err) {
        alertEl.textContent = err?.message || 'Failed to update status.';
        alertEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Update Status';
      }
    }

    async function deleteSchedule(id, title) {
      if (!window.confirm(`Delete schedule for "${title}"? This cannot be undone.`)) return;
      try {
        await del(`/api/v1/schedules/${id}`);
        showAlert('Schedule deleted.', 'success');
        loadSchedules();
      } catch (err) {
        showAlert(err?.message || 'Failed to delete schedule.', 'error');
      }
    }

    function updatePagination() {
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
    }

    function changePage(dir) {
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      loadSchedules();
    }

    function resetFilters() {
      document.getElementById('f-search').value    = '';
      document.getElementById('f-status').value    = '';
      document.getElementById('f-date-from').value = '';
      document.getElementById('f-date-to').value   = '';
      currentPage = 1;
      loadSchedules();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `mb-4 px-4 py-3 rounded-lg text-sm font-medium ${
        type === 'success' ? 'bg-green-50 border border-green-200 text-green-800'
                           : 'bg-red-50 border border-red-200 text-red-800'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 4000);
    }

    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escAttr(s) {
      return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatDate(d) {
      return d ? new Date(d).toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' }) : '"”';
    }
  </script>
</body>
</html>
