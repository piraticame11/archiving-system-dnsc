<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — DNSC Research System</title>
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans py-10">

  <div class="w-full max-w-lg px-4">
    <div class="bg-white rounded-2xl shadow-lg p-8">

      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-gray-900">Create an Account</h1>
        <p class="text-sm text-gray-500 mt-1">Registration requires approval from the Research Office.</p>
      </div>

      <div id="success-msg" class="hidden bg-green-50 border border-green-200 text-green-700 text-sm px-4 py-3 rounded-lg mb-4"></div>
      <div id="error-msg"   class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4"></div>

      <form id="register-form" novalidate>
        <div class="grid grid-cols-2 gap-4">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input id="first_name" name="first_name" type="text" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input id="last_name" name="last_name" type="text" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>

          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input id="email" name="email" type="email" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input id="password" name="password" type="password" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
            <p class="text-xs text-gray-400 mt-1">Min 8 chars, 1 uppercase, 1 number</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
          </div>

          <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
            <select id="role" name="role" required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
              <option value="">Select your role</option>
              <option value="student">Student</option>
              <option value="instructor">Instructor / Adviser</option>
              <option value="panelist">Panelist</option>
            </select>
          </div>

          <div class="col-span-2" id="dept-row">
            <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
            <select id="department_id" name="department_id"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
              <option value="">Select department</option>
            </select>
          </div>

          <div class="col-span-2 hidden" id="student-number-row">
            <label class="block text-sm font-medium text-gray-700 mb-1">Student Number</label>
            <input id="student_number" name="student_number" type="text"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
              placeholder="e.g. 2021-00001">
          </div>
        </div>

        <button type="submit" id="submit-btn"
          class="mt-6 w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-2.5 px-4 rounded-lg text-sm transition-colors disabled:opacity-60">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account? <a href="/pages/login.html" class="text-primary-600 hover:underline font-medium">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    // Load departments
    fetch('/api/v1/departments').then(r => r.json()).then(data => {
      const sel = document.getElementById('department_id');
      (data.data || []).forEach(d => {
        const o = document.createElement('option');
        o.value = d.id; o.textContent = d.name;
        sel.appendChild(o);
      });
    }).catch(() => {});

    // Show student number field for students
    document.getElementById('role').addEventListener('change', (e) => {
      const snRow = document.getElementById('student-number-row');
      snRow.classList.toggle('hidden', e.target.value !== 'student');
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn     = document.getElementById('submit-btn');
      const errEl   = document.getElementById('error-msg');
      const succEl  = document.getElementById('success-msg');
      errEl.classList.add('hidden');
      succEl.classList.add('hidden');

      const pw  = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      if (pw !== cpw) {
        errEl.textContent = 'Passwords do not match.';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true; btn.textContent = 'Creating…';

      const payload = {
        first_name:    document.getElementById('first_name').value.trim(),
        last_name:     document.getElementById('last_name').value.trim(),
        email:         document.getElementById('email').value.trim(),
        password:      pw,
        role:          document.getElementById('role').value,
        department_id: document.getElementById('department_id').value || null,
        student_number: document.getElementById('student_number').value.trim() || null,
      };

      try {
        const res  = await apiPost('/api/v1/auth/register', payload);
        const data = await res.json();
        if (!res.ok) {
          const msgs = Array.isArray(data.errors)
            ? data.errors.map(e => e.msg).join(' ')
            : (data.message || 'Registration failed.');
          errEl.textContent = msgs;
          errEl.classList.remove('hidden');
          return;
        }
        succEl.textContent = data.message;
        succEl.classList.remove('hidden');
        document.getElementById('register-form').reset();
      } catch {
        errEl.textContent = 'Network error. Please try again.';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
