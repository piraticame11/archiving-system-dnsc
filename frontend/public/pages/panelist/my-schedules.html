<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Schedules "” DNSC Research System</title>
  <link rel="icon" type="image/webp" href="/assets/img/aw.webp">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-input { width:100%;padding:.5rem .75rem;font-size:.875rem;border:1px solid #d1d5db;border-radius:.5rem;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff; }
    .form-input:focus { border-color:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.25); }
    tr:hover td { background:#f8fafc; }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- Navbar -->
  <nav class="bg-primary-700 text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <a href="/pages/panelist/dashboard.html" class="text-primary-200 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </a>
      <img src="/assets/img/aw.webp" alt="School Logo" class="w-9 h-9 object-contain rounded-lg">
      <span class="font-bold text-lg">DNSC Research System</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-name" class="text-sm text-primary-100"></span>
      <button onclick="logout()" class="text-sm bg-primary-800 hover:bg-primary-900 px-3 py-1.5 rounded-lg transition-colors">Sign out</button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-6 py-8">

    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900">My Schedules</h1>
      <p class="text-sm text-gray-500 mt-0.5">Defense schedules you are assigned to as a panelist</p>
    </div>

    <!-- Stats -->
    <div id="stats-row" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6"></div>

    <!-- Filters -->
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-3 mb-5 shadow-sm">
      <div class="relative flex-1 min-w-52">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 105 11a6 6 0 0012 0z"/></svg>
        <input id="f-search" type="text" placeholder="Search submission title…"
          class="w-full pl-9 pr-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
      </div>
      <select id="f-status" class="form-input w-auto text-sm py-2">
        <option value="">All Statuses</option>
        <option value="scheduled">Scheduled</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
        <option value="rescheduled">Rescheduled</option>
      </select>
      <button onclick="resetFilters()" class="px-3 py-2 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">Reset</button>
    </div>

    <!-- Schedule cards -->
    <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="col-span-full text-center text-sm text-gray-400 py-10">Loading schedules…</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="hidden mt-6 flex items-center justify-between">
      <p id="page-info" class="text-sm text-gray-500"></p>
      <div class="flex gap-2">
        <button id="btn-prev" onclick="changePage(-1)" class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Previous</button>
        <button id="btn-next" onclick="changePage(1)"  class="px-3 py-1.5 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">Next</button>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-xl flex flex-col max-h-[90vh]">
      <div class="flex items-center justify-between px-6 pt-6 pb-4 border-b border-gray-100 flex-shrink-0">
        <h2 id="detail-title" class="text-lg font-bold text-gray-900">Schedule Details</h2>
        <button onclick="closeDetail()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detail-body" class="overflow-y-auto px-6 py-5 space-y-4 flex-1"></div>
      <div id="detail-footer" class="px-6 pb-6 pt-2 border-t border-gray-100 flex-shrink-0"></div>
    </div>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/utils.js"></script>
  <script>
    function escHtml(s) { const d = document.createElement('div'); d.appendChild(document.createTextNode(s||'')); return d.innerHTML; }

    async function http(fn) {
      const res = await fn(); const json = await res.json();
      if (!res.ok) throw json; return json;
    }
    const get = path => http(() => apiGet(path));

    let currentPage = 1;
    let totalPages  = 1;
    let searchTimer = null;

    const STATUS_CFG = {
      scheduled:   { label: 'Scheduled',   cls: 'bg-blue-100 text-blue-700'   },
      completed:   { label: 'Completed',   cls: 'bg-green-100 text-green-700' },
      cancelled:   { label: 'Cancelled',   cls: 'bg-red-100 text-red-700'     },
      rescheduled: { label: 'Rescheduled', cls: 'bg-yellow-100 text-yellow-700'},
    };

    function badge(status) {
      const c = STATUS_CFG[status] || { label: status, cls: 'bg-gray-100 text-gray-700' };
      return `<span class="inline-flex px-2.5 py-0.5 rounded-full text-xs font-semibold ${c.cls}">${c.label}</span>`;
    }

    requireAuthAsync('panelist').then(user => {
      if (!user) return;
      document.getElementById('user-name').textContent = user.full_name || user.email;
      loadSchedules();

      document.getElementById('f-status').addEventListener('change', () => { currentPage = 1; loadSchedules(); });
      document.getElementById('f-search').addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { currentPage = 1; loadSchedules(); }, 350);
      });
    });

    async function loadSchedules() {
      const params = new URLSearchParams({ page: currentPage, limit: 12 });
      const search = document.getElementById('f-search').value.trim();
      const status = document.getElementById('f-status').value;
      if (search) params.set('search', search);
      if (status) params.set('status', status);

      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '<div class="col-span-full text-center text-sm text-gray-400 py-10">Loading…</div>';

      try {
        const res   = await get(`/api/v1/schedules?${params}`);
        const items = res.data?.data || [];
        totalPages  = res.data?.pagination?.totalPages || 1;
        const total = res.data?.pagination?.total || items.length;

        renderStats(items, total);
        document.getElementById('pagination').classList.toggle('hidden', totalPages <= 1);

        if (!items.length) {
          grid.innerHTML = '<div class="col-span-full text-center text-sm text-gray-400 py-10">No assigned schedules found.</div>';
          return;
        }

        grid.innerHTML = items.map(s => {
          const sc  = STATUS_CFG[s.status] || { label: s.status, cls: 'bg-gray-100 text-gray-700' };
          const dt  = new Date(s.scheduled_at);
          const upcoming = dt > new Date() && s.status === 'scheduled';
          return `
          <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 hover:shadow-md transition-shadow">
            <div class="flex items-start justify-between gap-2 mb-3">
              <h3 class="font-semibold text-gray-900 text-sm leading-snug line-clamp-2">${escHtml(s.submission_title)}</h3>
              ${badge(s.status)}
            </div>
            <div class="space-y-1.5 text-xs text-gray-500 mb-4">
              <p class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                ${formatDate(s.scheduled_at, true)}
              </p>
              ${s.venue_name ? `<p class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                ${escHtml(s.venue_name)}
              </p>` : ''}
              <p class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                ${s.duration_min || 60} min Â· ${(s.submission_type || s.defense_type || '').replace(/_/g,' ')}
              </p>
            </div>
            <div class="flex gap-2">
              <button onclick="openDetail(${s.id})"
                class="flex-1 px-3 py-1.5 text-xs font-semibold text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors">
                View Details
              </button>
              ${s.status !== 'cancelled' ? `
              <a href="/pages/panelist/evaluate.html?id=${s.id}"
                class="flex-1 px-3 py-1.5 text-xs font-semibold text-center text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors ${upcoming ? 'ring-2 ring-primary-400' : ''}">
                Evaluate
              </a>` : ''}
            </div>
          </div>`;
        }).join('');

        updatePagination();
      } catch (err) {
        grid.innerHTML = `<div class="col-span-full text-center text-sm text-red-500 py-10">${escHtml(err?.message || 'Failed to load.')}</div>`;
      }
    }

    function renderStats(items, total) {
      const scheduled   = items.filter(s => s.status === 'scheduled').length;
      const completed   = items.filter(s => s.status === 'completed').length;
      const rescheduled = items.filter(s => s.status === 'rescheduled').length;
      const cards = [
        { label: 'Total',       value: total,       color: 'text-primary-700' },
        { label: 'Upcoming',    value: scheduled,   color: 'text-blue-700'    },
        { label: 'Completed',   value: completed,   color: 'text-green-700'   },
        { label: 'Rescheduled', value: rescheduled, color: 'text-yellow-700'  },
      ];
      document.getElementById('stats-row').innerHTML = cards.map(c => `
        <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 shadow-sm">
          <p class="text-xs text-gray-500 mb-0.5">${c.label}</p>
          <p class="text-2xl font-bold ${c.color}">${c.value}</p>
        </div>`).join('');
    }

    async function openDetail(id) {
      document.getElementById('detail-title').textContent = 'Loading…';
      document.getElementById('detail-body').innerHTML    = '<p class="text-sm text-gray-400">Loading…</p>';
      document.getElementById('detail-footer').innerHTML  = '';
      document.getElementById('detail-modal').classList.remove('hidden');

      try {
        const res = await get(`/api/v1/schedules/${id}`);
        const s   = res.data;
        document.getElementById('detail-title').textContent = s.submission_title || 'Schedule Details';

        const panelHtml = s.panelists?.length
          ? s.panelists.map(p => `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-primary-50 text-primary-700">${escHtml(p.full_name)}</span>`).join('')
          : '<span class="text-gray-400 text-xs">None assigned</span>';

        document.getElementById('detail-body').innerHTML = `
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Status</p>${badge(s.status)}</div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Type</p><p class="text-gray-800">${escHtml((s.defense_type || s.submission_type || '').replace(/_/g,' '))}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Date & Time</p><p class="text-gray-800">${formatDate(s.scheduled_at, true)}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Duration</p><p class="text-gray-800">${s.duration_min || 60} minutes</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">Venue</p><p class="text-gray-800">${escHtml(s.venue_name || '"”')}</p></div>
            <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-0.5">School Year</p><p class="text-gray-800">${escHtml(s.school_year || '"”')}</p></div>
          </div>
          ${s.notes ? `<div><p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Notes</p><p class="text-sm text-gray-700">${escHtml(s.notes)}</p></div>` : ''}
          <div><p class="text-xs text-gray-400 uppercase tracking-wide mb-2">Panelists</p><div class="flex flex-wrap gap-2">${panelHtml}</div></div>`;

        document.getElementById('detail-footer').innerHTML = s.status !== 'cancelled'
          ? `<a href="/pages/panelist/evaluate.html?id=${s.id}" class="block w-full text-center px-4 py-2 text-sm font-semibold text-white bg-primary-600 hover:bg-primary-700 rounded-lg transition-colors">Go to Evaluate</a>`
          : '';
      } catch (err) {
        document.getElementById('detail-body').innerHTML = `<p class="text-sm text-red-500">${escHtml(err?.message || 'Failed to load.')}</p>`;
      }
    }

    function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }

    function changePage(dir) {
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      loadSchedules();
    }

    function updatePagination() {
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
      document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
    }

    function resetFilters() {
      document.getElementById('f-search').value = '';
      document.getElementById('f-status').value = '';
      currentPage = 1;
      loadSchedules();
    }
  </script>
</body>
</html>
